<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Birthday Racing Untuk Sayangku Ismayanti Baizura</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Segoe UI,sans-serif;
color:white;
touch-action:none;
}

canvas{display:block;}

#driver{
position:absolute;
top:15px;
left:15px;
font-weight:bold;
color:#ff4757;
z-index:2;
font-size:14px;
}

#scoreUI{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:26px;
font-weight:900;
text-shadow:0 0 10px #ff4757;
z-index:2;
}

#overlay{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
text-align:center;
padding:30px;
}

button{
padding:16px 36px;
font-size:18px;
border:none;
border-radius:40px;
background:#ff4757;
color:white;
margin-top:25px;
}

#countdown{
font-size:60px;
font-weight:900;
color:#ff4757;
margin-top:20px;
}

#celebration{
position:absolute;
top:0;
left:0;
pointer-events:none;
z-index:5;
}
</style>
</head>
<body>

<div id="driver">Driver: Ismayanti Baizura 🏎️</div>
<div id="scoreUI">❤️ <span id="score">0</span> / 15</div>

<div id="overlay">
<h1 style="color:#ff4757;">Ismayanti Baizura ❤️</h1>

<p style="max-width:500px;margin-top:20px;line-height:1.6;">
In Our Life...<br><br>
Banyak jalan kita dah tempuh sama-sama.<br>
Ada corner tajam.<br>
Ada stuck in bad traffic.<br><br>
Tapi satu benda tak pernah berubah...<br><br>
I tetap pilih you to be with me in any situation. ❤️
</p>

<button id="startBtn">
Start Our Journey 🚗❤️
</button>

<div id="countdown"></div>
</div>

<canvas id="game"></canvas>
<canvas id="celebration"></canvas>

<script>

/* ================= CORE ================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const ccanvas=document.getElementById("celebration");
const cctx=ccanvas.getContext("2d");

const overlay=document.getElementById("overlay");
const startBtn=document.getElementById("startBtn");
const scoreEl=document.getElementById("score");
const countdownEl=document.getElementById("countdown");

let running=false;
let celebrating=false;
let score=0;
let items=[];
let confetti=[];
let fireworks=[];
let roadOffset=0;

/* ================= AUDIO ================= */

const collectSound=new Audio("collect.mp3");
const hitSound=new Audio("hit.mp3");
const winSound=new Audio("win.mp3");
const bgMusic=new Audio("bgmusic.mp3");

bgMusic.loop=true;
bgMusic.volume=0.4;

/* ================= RESIZE ================= */

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
ccanvas.width=window.innerWidth;
ccanvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* ================= CAR ================= */

const carImg=new Image();
carImg.src="saga_blm.png";

let car={lane:1,w:70,h:130,x:0,y:0};

function updateCar(){
let laneW=canvas.width/3;
car.x=(car.lane*laneW)+(laneW/2)-(car.w/2);
car.y=canvas.height-180;
}
updateCar();

/* ================= TOUCH ================= */

window.addEventListener("touchstart",(e)=>{
if(!running)return;
let x=e.touches[0].clientX;

if(x<canvas.width/2 && car.lane>0){
car.lane--;
}

if(x>canvas.width/2 && car.lane<2){
car.lane++;
}

updateCar();
});

/* ================= KEYBOARD CONTROL ================= */

window.addEventListener("keydown",(e)=>{
if(!running) return;

if(e.key==="ArrowLeft" || e.key==="a" || e.key==="A"){
if(car.lane>0){
car.lane--;
updateCar();
}
}

if(e.key==="ArrowRight" || e.key==="d" || e.key==="D"){
if(car.lane<2){
car.lane++;
updateCar();
}
}
});

/* ================= START ================= */

startBtn.onclick=()=>{
overlay.style.display="none";
bgMusic.play();
running=true;
gameLoop();
};

/* ================= SPAWN ================= */

function spawn(){
items.push({
lane:Math.floor(Math.random()*3),
y:-50,
good:Math.random()>0.4
});
}

/* ================= CONFETTI ================= */

function createConfetti(){
confetti.length=0;

for(let i=0;i<200;i++){
confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*-canvas.height,
size:4+Math.random()*4,
speed:2+Math.random()*3,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
}

/* ================= FIREWORK ================= */

function createFirework(){
let cx=Math.random()*canvas.width;
let cy=Math.random()*canvas.height/2;

for(let i=0;i<80;i++){
fireworks.push({
x:cx,
y:cy,
dx:(Math.random()-0.5)*10,
dy:(Math.random()-0.5)*10,
alpha:1,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
}

/* ================= WIN ================= */

function win(){
running=false;
celebrating=true;
bgMusic.pause();
winSound.play();

createConfetti();
createFirework();

overlay.style.display="flex";

overlay.innerHTML=`
<h1 style='color:#ff4757;'>Happy Birthday Sayang 🎂❤️</h1>

<p style="margin-top:20px;max-width:500px;line-height:1.7;">
From the first day sampai sekarang...<br><br>

I tak pernah stop choosing you.<br><br>

Dalam hidup ni mungkin banyak jalan berliku,
kadang I jatuh, kadang you yang bangunkan I.<br><br>

But I promise you this...<br>
I nak terus drive hidup ni dengan you sampai tua nanti.<br><br>

You're not just my LOVE.<br>
You're my HOME my LIFE. ❤️<br><br>

Selamat hari lahir, my forever co-driver.
</p>

<button onclick="location.reload()">Play Again 🚗</button>
`;

celebrationLoop();
}

/* ================= GAME LOOP ================= */

function gameLoop(){

if(!running) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

/* BACKGROUND */
let grad=ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,"#0f0f0f");
grad.addColorStop(1,"#1f1f1f");
ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* ROAD */
let laneW=canvas.width/3;
roadOffset+=6;

ctx.strokeStyle="rgba(255,255,255,.2)";
ctx.setLineDash([30,40]);
ctx.lineDashOffset=-roadOffset;

ctx.beginPath();
ctx.moveTo(laneW,0);
ctx.lineTo(laneW,canvas.height);
ctx.moveTo(laneW*2,0);
ctx.lineTo(laneW*2,canvas.height);
ctx.stroke();

ctx.setLineDash([]);

/* CAR */
ctx.drawImage(carImg,car.x,car.y,car.w,car.h);

/* SPAWN */
if(Math.random()<0.03) spawn();

/* ITEMS */
for(let i=items.length-1;i>=0;i--){
let it=items[i];
it.y+=6;

let x=(it.lane*(canvas.width/3))+(canvas.width/6);

ctx.font="40px Arial";
ctx.textAlign="center";
ctx.fillText(it.good?"❤️":"💢",x,it.y);

if(it.y>car.y && it.y<car.y+car.h && it.lane===car.lane){

if(it.good){
score++;
scoreEl.innerText=score;
collectSound.currentTime=0;
collectSound.play();

if(score>=15) win();
}
else{
hitSound.currentTime=0;
hitSound.play();
}

items.splice(i,1);
}

if(it.y>canvas.height){
items.splice(i,1);
}
}

requestAnimationFrame(gameLoop);
}

/* ================= CELEBRATION ================= */

function celebrationLoop(){

if(!celebrating) return;

cctx.clearRect(0,0,ccanvas.width,ccanvas.height);

/* CONFETTI */
for(let i=confetti.length-1;i>=0;i--){
let c=confetti[i];
c.y+=c.speed;

cctx.fillStyle=c.color;
cctx.fillRect(c.x,c.y,c.size,c.size);

if(c.y>ccanvas.height){
confetti.splice(i,1);
}
}

/* FIREWORK */
for(let i=fireworks.length-1;i>=0;i--){
let f=fireworks[i];

f.x+=f.dx;
f.y+=f.dy;
f.alpha-=0.02;

cctx.globalAlpha=f.alpha;
cctx.fillStyle=f.color;
cctx.beginPath();
cctx.arc(f.x,f.y,2,0,Math.PI*2);
cctx.fill();
cctx.globalAlpha=1;

if(f.alpha<=0){
fireworks.splice(i,1);
}
}

if(Math.random()<0.05){
createFirework();
}

requestAnimationFrame(celebrationLoop);
}

</script>
</body>
</html>
