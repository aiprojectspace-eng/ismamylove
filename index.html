<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti 2D RPG</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
touch-action:none;
font-family:Arial;
}

canvas{
display:block;
}

#attackBtn{
position:absolute;
right:30px;
bottom:40px;
width:90px;
height:90px;
border-radius:50%;
border:none;
background:#ff4da6;
color:white;
font-size:18px;
font-weight:bold;
}

#hpBar{
position:absolute;
top:20px;
left:20px;
width:250px;
height:20px;
background:red;
}

#hpFill{
height:100%;
width:100%;
background:lime;
}
</style>
</head>
<body>

<div id="hpBar"><div id="hpFill"></div></div>
<button id="attackBtn">⚔️</button>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ================= */
/* GAME OBJECTS */
/* ================= */

let hero = {
x:100,
y:canvas.height-250,
width:80,
height:120
};

let dragon = {
x:canvas.width-250,
y:canvas.height-300,
width:150,
height:150,
hp:100
};

/* ================= */
/* TOUCH MOVE */
/* ================= */

canvas.addEventListener("touchmove",(e)=>{
let touch = e.touches[0];
hero.x = touch.clientX - hero.width/2;
});

/* ================= */
/* ATTACK */
/* ================= */

document.getElementById("attackBtn")
.addEventListener("touchstart",()=>{
attack();
});

function attack(){
let dx = hero.x - dragon.x;

if(Math.abs(dx) < 180){
dragon.hp -= 20;

if(dragon.hp <= 0){
dragon.hp = 0;
setTimeout(()=>{
showVictory();
},500);
}
}
}

/* ================= */
/* DRAW HERO (CUTE PRINCESS SHAPE) */
/* ================= */

function drawHero(){
ctx.fillStyle = "#ff66cc";
ctx.beginPath();
ctx.arc(hero.x + hero.width/2,
hero.y + 40,
40,
0,
Math.PI*2);
ctx.fill();

/* body */
ctx.fillRect(hero.x,
hero.y + 40,
hero.width,
hero.height - 40);
}

/* ================= */
/* DRAW DRAGON */
/* ================= */

function drawDragon(){
if(dragon.hp <= 0) return;

ctx.fillStyle = "#9933ff";
ctx.beginPath();
ctx.arc(dragon.x + 75,
dragon.y + 75,
75,
0,
Math.PI*2);
ctx.fill();

/* hp bar above dragon */
ctx.fillStyle="red";
ctx.fillRect(dragon.x,
dragon.y - 20,
150,
10);

ctx.fillStyle="lime";
ctx.fillRect(dragon.x,
dragon.y - 20,
dragon.hp/100 * 150,
10);
}

/* ================= */
/* GAME LOOP */
/* ================= */

function update(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#2c3e50";
ctx.fillRect(0,0,canvas.width,canvas.height);

drawHero();
drawDragon();

document.getElementById("hpFill").style.width = dragon.hp + "%";

requestAnimationFrame(update);
}

update();

/* ================= */
/* WIN SCREEN */
/* ================= */

function showVictory(){

document.body.innerHTML = `
<div style="color:white;text-align:center;margin-top:200px;">
<h1>🐉 Dragon Defeated!</h1>
<h2>Happy Birthday Ismayanti ❤️</h2>
<p>You saved your kingdom.</p>
</div>
`;
}

</script>

</body>
</html>
