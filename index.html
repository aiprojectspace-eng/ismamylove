<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti Visual RPG</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
touch-action:none;
}

canvas{
display:block;
}

#attackBtn{
position:absolute;
right:30px;
bottom:40px;
width:90px;
height:90px;
border-radius:50%;
border:none;
background:#ff4da6;
color:white;
font-size:18px;
font-weight:bold;
}
</style>
</head>
<body>

<button id="attackBtn">⚔️</button>
<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ================= */
/* LOAD IMAGES */
/* ================= */

const bg = new Image();
bg.src = "background.png";

const heroImg = new Image();
heroImg.src = "hero.png";

const dragonImg = new Image();
dragonImg.src = "dragon.png";

const treeImg = new Image();
treeImg.src = "tree.png";

/* ================= */
/* GAME OBJECTS */
/* ================= */

let hero = {
x:100,
y:canvas.height - 250,
width:150,
height:150,
hp:100
};

let dragon = {
x:canvas.width - 300,
y:canvas.height - 300,
width:200,
height:200,
hp:100
};

let trees = [];

/* Spawn trees random */
for(let i=0;i<5;i++){
trees.push({
x: Math.random() * canvas.width,
y: canvas.height - 250
});
}

/* ================= */
/* TOUCH MOVE */
/* ================= */

canvas.addEventListener("touchmove",(e)=>{
let touch = e.touches[0];
hero.x = touch.clientX - hero.width/2;
});

/* ================= */
/* ATTACK */
/* ================= */

document.getElementById("attackBtn")
.addEventListener("touchstart",()=>{
attack();
});

function attack(){
let dx = hero.x - dragon.x;

if(Math.abs(dx) < 200){
dragon.hp -= 20;

if(dragon.hp <= 0){
dragon.hp = 0;
setTimeout(()=>winScreen(),500);
}
}
}

/* ================= */
/* DRAW FUNCTION */
/* ================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Background */
ctx.drawImage(bg,0,0,canvas.width,canvas.height);

/* Trees */
trees.forEach(tree=>{
ctx.drawImage(treeImg,tree.x,tree.y,150,150);
});

/* Hero */
ctx.drawImage(heroImg,hero.x,hero.y,hero.width,hero.height);

/* Dragon */
if(dragon.hp > 0){
ctx.drawImage(dragonImg,dragon.x,dragon.y,dragon.width,dragon.height);

/* Dragon HP Bar */
ctx.fillStyle="red";
ctx.fillRect(dragon.x,dragon.y-20,200,10);

ctx.fillStyle="lime";
ctx.fillRect(dragon.x,dragon.y-20,dragon.hp/100*200,10);
}

/* Hero HP */
ctx.fillStyle="red";
ctx.fillRect(20,20,200,15);
ctx.fillStyle="lime";
ctx.fillRect(20,20,hero.hp/100*200,15);

}

/* ================= */
/* GAME LOOP */
/* ================= */

function loop(){
draw();
requestAnimationFrame(loop);
}

loop();

/* ================= */
/* WIN SCREEN */
/* ================= */

function winScreen(){

document.body.innerHTML = `
<div style="color:white;text-align:center;margin-top:200px;">
<h1>🐉 Dragon Defeated!</h1>
<h2>Happy Birthday ❤️</h2>
</div>
`;

}

</script>

</body>
</html>
