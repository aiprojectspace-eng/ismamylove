<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti 3D Birthday Quest</title>
<style>
body { margin:0; overflow:hidden; }
#attackBtn{
 position:absolute;
 right:20px;
 bottom:30px;
 width:80px;
 height:80px;
 border-radius:50%;
 background:#ff4da6;
 color:white;
 border:none;
 font-size:20px;
 z-index:10;
}
</style>
</head>
<body>

<button id="attackBtn">⚔️</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

/* FLOOR */
let floorGeo = new THREE.PlaneGeometry(200,200);
let floorMat = new THREE.MeshPhongMaterial({color:0x88cc88});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* HERO (Chibi Style Simple Model) */
let heroGroup = new THREE.Group();

let body = new THREE.Mesh(
 new THREE.CylinderGeometry(0.5,0.5,1.2,32),
 new THREE.MeshPhongMaterial({color:0xff99cc})
);
body.position.y = 1;
heroGroup.add(body);

let head = new THREE.Mesh(
 new THREE.SphereGeometry(0.7,32,32),
 new THREE.MeshPhongMaterial({color:0xffccdd})
);
head.position.y = 2;
heroGroup.add(head);

scene.add(heroGroup);

/* DRAGON */
let dragon = new THREE.Mesh(
 new THREE.BoxGeometry(2,2,2),
 new THREE.MeshPhongMaterial({color:0x9933ff})
);
dragon.position.set(10,1,0);
scene.add(dragon);

/* TOWER */
let tower = new THREE.Mesh(
 new THREE.CylinderGeometry(1.5,1.5,6,32),
 new THREE.MeshPhongMaterial({color:0x888888})
);
tower.position.set(20,3,0);
scene.add(tower);

camera.position.set(0,5,10);

/* MOBILE CONTROL */
let moveLeft=false, moveRight=false;

window.addEventListener("touchstart", e=>{
 if(e.touches[0].clientX < window.innerWidth/2){
   moveLeft=true;
 } else {
   moveRight=true;
 }
});

window.addEventListener("touchend", ()=>{
 moveLeft=false;
 moveRight=false;
});

/* ATTACK */
document.getElementById("attackBtn").addEventListener("click", ()=>{
 let dist = heroGroup.position.distanceTo(dragon.position);
 if(dist < 3){
   scene.remove(dragon);
   alert("🐉 Dragon Defeated!");
 }
});

/* GAME LOOP */
function animate(){
 requestAnimationFrame(animate);

 if(moveLeft) heroGroup.position.x -= 0.1;
 if(moveRight) heroGroup.position.x += 0.1;

 // Camera follow
 camera.position.x = heroGroup.position.x;
 camera.lookAt(heroGroup.position);

 // Win condition
 if(!scene.children.includes(dragon) &&
    heroGroup.position.distanceTo(tower.position)<3){
     document.body.innerHTML=`
     <div style="color:white;text-align:center;margin-top:100px;font-family:sans-serif;">
     <h1>🏰 Tower Reached!</h1>
     <h2>Ismayanti Baizura, you saved your husband 💖</h2>
     <p>
     5 March — my hero was born.
     You conquered dragons and reached the tower.
     Happy Birthday My Warrior Queen.
     I love you forever.
     </p>
     </div>`;
 }

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
