<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Birthday Racing Untuk Sayangku Ismayanti Baizura</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#0f0f0f;
    font-family:Segoe UI, sans-serif;
    color:white;
    touch-action:none;
}

canvas{
    display:block;
}

#driver{
    position:absolute;
    top:15px;
    left:15px;
    font-weight:bold;
    color:#ff4757;
}

#scoreUI{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:32px;
    font-weight:900;
    text-shadow:0 0 10px #ff4757;
}

#praise{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#feca57;
    opacity:0;
    transition:.3s;
}

#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.92);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

.panel{
    background:rgba(255,255,255,.05);
    padding:40px;
    border-radius:25px;
    text-align:center;
    border:1px solid #ff4757;
}

button{
    padding:18px 40px;
    font-size:20px;
    border:none;
    border-radius:40px;
    background:#ff4757;
    color:white;
    margin-top:20px;
}

#countdown{
    font-size:70px;
    font-weight:900;
    color:#ff4757;
    margin-top:20px;
}
</style>
</head>
<body>

<div id="driver">Driver: Ismayanti Baizura 🏎️</div>
<div id="scoreUI">❤️ <span id="score">0</span> / 15</div>
<div id="praise"></div>

<div id="overlay">
<div class="panel">
<h1 style="color:#ff4757">Drive Elok2 Tau Kete Saga Sampan I Ni</h1>
<p>Elak STRESS 💢<br>Kutip LOVE ❤️<br><br>Tap Left / Right</p>
<button id="startBtn">Start Engine</button>
<div id="countdown"></div>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const praise = document.getElementById("praise");
const overlay = document.getElementById("overlay");
const startBtn = document.getElementById("startBtn");
const countdownEl = document.getElementById("countdown");

let running=false;
let score=0;
let speed=6;
let items=[];
let frame=0;

/* AUDIO */
const collectSound=new Audio("collect.mp3");
const hitSound=new Audio("hit.mp3");
const winSound=new Audio("win.mp3");
const bgMusic=new Audio("bgmusic.mp3");

bgMusic.loop=true;
bgMusic.volume=0.4;

/* UNLOCK AUDIO */
function unlockAudio(){
    [collectSound,hitSound,winSound,bgMusic].forEach(a=>{
        a.play().then(()=>a.pause()).catch(()=>{});
    });
}

/* CANVAS */
function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* CAR */
const carImg=new Image();
carImg.src="saga_blm.png";

let car={
    lane:1,
    w:70,
    h:130,
    x:0,
    y:0
};

function updateCar(){
    let laneW=canvas.width/3;
    car.x=(car.lane*laneW)+(laneW/2)-(car.w/2);
    car.y=canvas.height-180;
}
updateCar();

/* TOUCH CONTROL */
window.addEventListener("touchstart",(e)=>{
    if(!running)return;
    let x=e.touches[0].clientX;
    if(x<canvas.width/2 && car.lane>0) car.lane--;
    if(x>canvas.width/2 && car.lane<2) car.lane++;
    updateCar();
});

/* PRAISE */
const praises=[
"Nice Sayang!",
"Power!",
"Racing Queen!",
"Abang Bangga!",
"Sikit Lagi!"
];

function showPraise(){
    praise.innerText=praises[Math.floor(Math.random()*praises.length)];
    praise.style.opacity=1;
    setTimeout(()=>praise.style.opacity=0,800);
}

/* SPAWN */
function spawn(){
    let lane=Math.floor(Math.random()*3);
    let good=Math.random()>0.4;
    items.push({
        lane:lane,
        y:-50,
        good:good
    });
}

/* START */
startBtn.onclick=()=>{
    unlockAudio();
    startBtn.style.display="none";
    bgMusic.play();
    startCountdown();
};

function startCountdown(){
    let c=3;
    countdownEl.innerText=c;
    let timer=setInterval(()=>{
        c--;
        countdownEl.innerText=c;
        if(c<=0){
            clearInterval(timer);
            overlay.style.display="none";
            running=true;
            animate();
        }
    },1000);
}

/* WIN */
function win(){
    running=false;
    bgMusic.pause();
    winSound.play();
    overlay.style.display="flex";
    overlay.querySelector("h1").innerHTML="SELAMAT HARI LAHIR ISMAYANTI BAIZURA 🎂";
    countdownEl.innerText="You're Still The One ❤️";
}

/* DRAW ROAD */
function drawRoad(){
    let laneW=canvas.width/3;
    ctx.strokeStyle="rgba(255,255,255,.15)";
    ctx.setLineDash([30,40]);
    ctx.beginPath();
    ctx.moveTo(laneW,0);
    ctx.lineTo(laneW,canvas.height);
    ctx.moveTo(laneW*2,0);
    ctx.lineTo(laneW*2,canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
}

/* LOOP */
function animate(){
    if(!running) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // background gradient
    let grad=ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,"#0f0f0f");
    grad.addColorStop(1,"#1f1f1f");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawRoad();
    ctx.drawImage(carImg,car.x,car.y,car.w,car.h);

    frame++;
    if(frame%50===0) spawn();

    for(let i=items.length-1;i>=0;i--){
        let it=items[i];
        it.y+=speed;

        let x=(it.lane*(canvas.width/3))+(canvas.width/6);
        ctx.font="40px Arial";
        ctx.textAlign="center";
        ctx.fillText(it.good?"❤️":"💢",x,it.y);

        if(it.y>car.y && it.y<car.y+car.h && it.lane===car.lane){
            if(it.good){
                score++;
                scoreEl.innerText=score;
                collectSound.currentTime=0;
                collectSound.play();
                showPraise();
                if(score>=15) win();
            }else{
                score=Math.max(0,score-1);
                scoreEl.innerText=score;
                hitSound.currentTime=0;
                hitSound.play();
            }
            items.splice(i,1);
        }

        if(it.y>canvas.height) items.splice(i,1);
    }

    requestAnimationFrame(animate);
}
</script>

</body>
</html>
