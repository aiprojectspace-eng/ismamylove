<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Birthday Racing Untuk Sayangku Ismayanti Baizura</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Segoe UI,sans-serif;
color:white;
touch-action:none;
}

canvas{display:block;}

#driver{
position:absolute;
top:15px;
left:15px;
font-weight:bold;
color:#ff4757;
z-index:2;
}

#scoreUI{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:32px;
font-weight:900;
text-shadow:0 0 10px #ff4757;
z-index:2;
}

#overlay{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
text-align:center;
padding:30px;
}

button{
padding:18px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff4757;
color:white;
margin-top:30px;
}

#countdown{
font-size:60px;
font-weight:900;
color:#ff4757;
margin-top:20px;
}
</style>
</head>
<body>

<div id="driver">Driver: Ismayanti Baizura 🏎️</div>
<div id="scoreUI">❤️ <span id="score">0</span> / 15</div>

<div id="overlay">
<h1 style="color:#ff4757;">Untuk Ismayanti Baizura ❤️</h1>

<p id="introText" style="max-width:500px;margin-top:20px;line-height:1.6;opacity:0;transition:1.5s;">
Dalam hidup ni...<br><br>
Banyak jalan kita dah tempuh bersama.<br>
Ada selekoh tajam.<br>
Ada jalan jem.<br><br>
Tapi satu benda tak pernah berubah...<br><br>
I tetap pilih you. ❤️
</p>

<button id="startBtn" style="display:none;">
Start Our Journey 🚗❤️
</button>

<div id="countdown"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const overlay=document.getElementById("overlay");
const introText=document.getElementById("introText");
const startBtn=document.getElementById("startBtn");
const countdownEl=document.getElementById("countdown");
const scoreEl=document.getElementById("score");

let running=false;
let score=0;
let items=[];
let speed=6;

/* AUDIO */
const collectSound=new Audio("collect.mp3");
const hitSound=new Audio("hit.mp3");
const winSound=new Audio("win.mp3");
const bgMusic=new Audio("bgmusic.mp3");
bgMusic.loop=true;
bgMusic.volume=0.4;

function unlockAudio(){
[collectSound,hitSound,winSound,bgMusic].forEach(a=>{
a.play().then(()=>a.pause()).catch(()=>{});
});
}

/* INTRO */
function romanticIntro(){
setTimeout(()=>{ introText.style.opacity=1; },800);
setTimeout(()=>{ startBtn.style.display="inline-block"; },3000);
}

romanticIntro();

/* RESIZE */
function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* CAR */
const carImg=new Image();
carImg.src="saga_blm.png";

let car={lane:1,w:70,h:130,x:0,y:0};

function updateCar(){
let laneW=canvas.width/3;
car.x=(car.lane*laneW)+(laneW/2)-(car.w/2);
car.y=canvas.height-180;
}
updateCar();

/* TOUCH */
window.addEventListener("touchstart",(e)=>{
if(!running)return;
let x=e.touches[0].clientX;
if(x<canvas.width/2 && car.lane>0) car.lane--;
if(x>canvas.width/2 && car.lane<2) car.lane++;
updateCar();
});

/* START */
startBtn.onclick=()=>{
unlockAudio();
startBtn.style.display="none";
introText.style.display="none";
startCountdown();
};

function startCountdown(){
let c=3;
countdownEl.innerText=c;

let timer=setInterval(()=>{
c--;
countdownEl.innerText=c;

if(c<=0){
clearInterval(timer);
overlay.style.display="none";
bgMusic.play();
running=true;
animate();
}
},1000);
}

/* WIN */
function win(){
running=false;
bgMusic.pause();
winSound.play();
overlay.style.display="flex";
overlay.innerHTML="<h1 style='color:#ff4757;'>SELAMAT HARI LAHIR ISMAYANTI BAIZURA 🎂</h1><p>You're Still The One ❤️</p>";
}

/* SPAWN */
function spawn(){
let lane=Math.floor(Math.random()*3);
let good=Math.random()>0.4;
items.push({lane:lane,y:-50,good:good});
}

/* LOOP */
function animate(){
if(!running) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Background */
let grad=ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,"#0f0f0f");
grad.addColorStop(1,"#1f1f1f");
ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* Road */
let laneW=canvas.width/3;
ctx.strokeStyle="rgba(255,255,255,.15)";
ctx.setLineDash([30,40]);
ctx.beginPath();
ctx.moveTo(laneW,0);
ctx.lineTo(laneW,canvas.height);
ctx.moveTo(laneW*2,0);
ctx.lineTo(laneW*2,canvas.height);
ctx.stroke();
ctx.setLineDash([]);

/* Car */
ctx.drawImage(carImg,car.x,car.y,car.w,car.h);

/* Spawn */
if(Math.random()<0.03) spawn();

/* Items */
for(let i=items.length-1;i>=0;i--){
let it=items[i];
it.y+=speed;

let x=(it.lane*(canvas.width/3))+(canvas.width/6);
ctx.font="40px Arial";
ctx.textAlign="center";
ctx.fillText(it.good?"❤️":"💢",x,it.y);

if(it.y>car.y && it.y<car.y+car.h && it.lane===car.lane){
if(it.good){
score++;
scoreEl.innerText=score;
collectSound.currentTime=0;
collectSound.play();
if(score>=15) win();
}else{
hitSound.currentTime=0;
hitSound.play();
}
items.splice(i,1);
}

if(it.y>canvas.height) items.splice(i,1);
}

requestAnimationFrame(animate);
}
</script>
</body>
</html>
