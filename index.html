<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti 2D RPG</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
touch-action:none;
}

canvas{
display:block;
}

#attackBtn{
position:absolute;
right:30px;
bottom:40px;
width:80px;
height:80px;
border-radius:50%;
border:none;
background:#ff4da6;
color:white;
font-size:18px;
font-weight:bold;
}

#hpBar{
position:absolute;
top:20px;
left:20px;
width:200px;
height:20px;
background:red;
}

#hpFill{
height:100%;
width:100%;
background:lime;
}
</style>
</head>
<body>

<div id="hpBar"><div id="hpFill"></div></div>
<button id="attackBtn">⚔️</button>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ================= */
/* LOAD SPRITES */
/* ================= */

const heroImg = new Image();
heroImg.src = "https://i.imgur.com/5b6XQ5M.png"; // princess sprite

const dragonImg = new Image();
dragonImg.src = "https://i.imgur.com/7yUve0A.png"; // dragon sprite

const bg = new Image();
bg.src = "https://i.imgur.com/8pQYFqk.jpg"; // forest background

/* ================= */
/* GAME VARIABLES */
/* ================= */

let hero = {
x:100,
y:canvas.height-200,
width:120,
height:120,
hp:100
};

let dragon = {
x:canvas.width-250,
y:canvas.height-250,
width:150,
height:150,
hp:100
};

let keys = {};

/* ================= */
/* CONTROLS */
/* ================= */

canvas.addEventListener("touchmove",(e)=>{
let touch = e.touches[0];
hero.x = touch.clientX - hero.width/2;
});

document.getElementById("attackBtn")
.addEventListener("touchstart",()=>{
attack();
});

/* ================= */
/* ATTACK FUNCTION */
/* ================= */

function attack(){
let dx = hero.x - dragon.x;

if(Math.abs(dx) < 150){
dragon.hp -= 20;
if(dragon.hp <= 0){
dragon.hp = 0;
setTimeout(()=>{
showVictory();
},500);
}
}
}

/* ================= */
/* DRAW GAME */
/* ================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(bg,0,0,canvas.width,canvas.height);

/* HERO */
ctx.drawImage(heroImg,hero.x,hero.y,hero.width,hero.height);

/* DRAGON */
if(dragon.hp > 0){
ctx.drawImage(dragonImg,dragon.x,dragon.y,dragon.width,dragon.height);
}

/* HP BAR */
document.getElementById("hpFill").style.width = dragon.hp + "%";
}

/* ================= */
/* GAME LOOP */
/* ================= */

function update(){
draw();
requestAnimationFrame(update);
}

update();

/* ================= */
/* WIN SCREEN */
/* ================= */

function showVictory(){

document.body.innerHTML = `
<div style="color:white;text-align:center;margin-top:200px;">
<h1>🐉 Dragon Defeated!</h1>
<h2>Ismayanti Baizura ❤️</h2>
<p>
You saved your kingdom.<br>
Happy Birthday My Warrior Queen.
</p>
</div>
`;
}

</script>

</body>
</html>
