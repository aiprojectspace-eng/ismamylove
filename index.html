<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Birthday Racing Untuk Sayangku Ismayanti Baizura</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Segoe UI,sans-serif;
color:white;
touch-action:none;
}

canvas{display:block;}

#driver{
position:absolute;
top:15px;
left:15px;
font-weight:bold;
color:#ff4757;
z-index:2;
}

#scoreUI{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:32px;
font-weight:900;
text-shadow:0 0 10px #ff4757;
z-index:2;
}

#praise{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
color:#feca57;
opacity:0;
transition:.3s;
z-index:2;
}

#overlay{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

.panel{
text-align:center;
animation:fadeIn 1.5s ease forwards;
}

button{
padding:18px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff4757;
color:white;
margin-top:20px;
}

#countdown{
font-size:70px;
font-weight:900;
color:#ff4757;
margin-top:20px;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(.9);}
to{opacity:1; transform:scale(1);}
}
</style>
</head>
<body>

<div id="driver">Driver: Ismayanti Baizura 🏎️</div>
<div id="scoreUI">❤️ <span id="score">0</span> / 15</div>
<div id="praise"></div>

<div id="overlay">
<div class="panel">
<h1 style="color:#ff4757;font-size:38px">Engine Starting...</h1>
<button id="startBtn">Start Engine</button>
<div id="countdown"></div>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const overlay=document.getElementById("overlay");
const startBtn=document.getElementById("startBtn");
const countdownEl=document.getElementById("countdown");
const praise=document.getElementById("praise");
const scoreEl=document.getElementById("score");

let running=false;
let score=0;
let speed=6;
let items=[];
let particles=[];
let confetti=[];
let flash=0;

/* AUDIO */
const collectSound=new Audio("collect.mp3");
const hitSound=new Audio("hit.mp3");
const winSound=new Audio("win.mp3");
const bgMusic=new Audio("bgmusic.mp3");
bgMusic.loop=true;
bgMusic.volume=0.4;

function unlockAudio(){
[collectSound,hitSound,winSound,bgMusic].forEach(a=>{
a.play().then(()=>a.pause()).catch(()=>{});
});
}

/* RESIZE */
function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* CAR */
const carImg=new Image();
carImg.src="saga_blm.png";

let car={lane:1,w:70,h:130,x:0,y:0};

function updateCar(){
let laneW=canvas.width/3;
car.x=(car.lane*laneW)+(laneW/2)-(car.w/2);
car.y=canvas.height-180;
}
updateCar();

/* TOUCH */
window.addEventListener("touchstart",(e)=>{
if(!running)return;
let x=e.touches[0].clientX;
if(x<canvas.width/2 && car.lane>0) car.lane--;
if(x>canvas.width/2 && car.lane<2) car.lane++;
updateCar();
});

/* PRAISE */
const praises=["Nice Sayang!","Power!","Racing Queen!","Abang Bangga!"];
function showPraise(){
praise.innerText=praises[Math.floor(Math.random()*praises.length)];
praise.style.opacity=1;
setTimeout(()=>praise.style.opacity=0,800);
}

/* PARTICLE BURST */
function makeParticles(x,y){
for(let i=0;i<15;i++){
particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:40
});
}
}

/* CONFETTI */
function makeConfetti(){
for(let i=0;i<200;i++){
confetti.push({
x:Math.random()*canvas.width,
y:-10,
vy:Math.random()*4+2,
color:"hsl("+Math.random()*360+",80%,60%)"
});
}
}

/* SPAWN */
function spawn(){
let lane=Math.floor(Math.random()*3);
let good=Math.random()>0.4;
items.push({lane:lane,y:-50,good:good});
}

/* START */
startBtn.onclick=()=>{
unlockAudio();
startBtn.style.display="none";
cinematicIntro();
};

function cinematicIntro(){
let text=overlay.querySelector("h1");
let c=3;
countdownEl.innerText=c;

bgMusic.play();

let timer=setInterval(()=>{
c--;
countdownEl.innerText=c;
if(c<=0){
clearInterval(timer);
overlay.style.display="none";
running=true;
animate();
}
},1000);
}

/* WIN */
function win(){
running=false;
bgMusic.pause();
winSound.play();
makeConfetti();
overlay.style.display="flex";
overlay.querySelector("h1").innerHTML="SELAMAT HARI LAHIR ISMAYANTI BAIZURA 🎂";
countdownEl.innerText="You're Still The One ❤️";
}

/* LOOP */
function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* Background */
let grad=ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,"#0f0f0f");
grad.addColorStop(1,"#1f1f1f");
ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* Road */
let laneW=canvas.width/3;
ctx.strokeStyle="rgba(255,255,255,.15)";
ctx.setLineDash([30,40]);
ctx.beginPath();
ctx.moveTo(laneW,0);
ctx.lineTo(laneW,canvas.height);
ctx.moveTo(laneW*2,0);
ctx.lineTo(laneW*2,canvas.height);
ctx.stroke();
ctx.setLineDash([]);

/* Car */
ctx.drawImage(carImg,car.x,car.y,car.w,car.h);

/* Spawn */
if(running && Math.random()<0.03) spawn();

/* Items */
for(let i=items.length-1;i>=0;i--){
let it=items[i];
it.y+=speed;
let x=(it.lane*(canvas.width/3))+(canvas.width/6);
ctx.font="40px Arial";
ctx.textAlign="center";
ctx.fillText(it.good?"❤️":"💢",x,it.y);

if(running && it.y>car.y && it.y<car.y+car.h && it.lane===car.lane){
if(it.good){
score++;
scoreEl.innerText=score;
collectSound.currentTime=0;
collectSound.play();
showPraise();
makeParticles(x,it.y);
flash=5;
if(score>=15) win();
}else{
hitSound.currentTime=0;
hitSound.play();
}
items.splice(i,1);
}
if(it.y>canvas.height) items.splice(i,1);
}

/* Particles */
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];
p.x+=p.vx;
p.y+=p.vy;
p.life--;
ctx.fillStyle="#ff6b81";
ctx.beginPath();
ctx.arc(p.x,p.y,4,0,Math.PI*2);
ctx.fill();
if(p.life<=0) particles.splice(i,1);
}

/* Confetti */
for(let i=confetti.length-1;i>=0;i--){
let c=confetti[i];
c.y+=c.vy;
ctx.fillStyle=c.color;
ctx.fillRect(c.x,c.y,6,6);
if(c.y>canvas.height) confetti.splice(i,1);
}

/* Flash effect */
if(flash>0){
ctx.fillStyle="rgba(255,255,255,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);
flash--;
}

requestAnimationFrame(animate);
}
</script>
</body>
</html>
