<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti 3D RPG</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
}

canvas{
display:block;
}

#joy{
position:absolute;
left:30px;
bottom:40px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.2);
}

#attack{
position:absolute;
right:30px;
bottom:40px;
width:80px;
height:80px;
border-radius:50%;
border:none;
background:#ff4da6;
color:white;
font-size:20px;
font-weight:bold;
}
</style>
</head>
<body>

<div id="joy"></div>
<button id="attack">⚔️</button>

<!-- ✅ THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<!-- ✅ GLTF LOADER -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/loaders/GLTFLoader.js"></script>

<script>

/* ===================== */
/* BASIC SETUP */
/* ===================== */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
light.castShadow = true;
scene.add(light);

/* FLOOR */
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x55aa55})
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

camera.position.set(0,5,12);

/* ===================== */
/* LOAD MODELS */
/* ===================== */

const loader = new GLTFLoader(); // ✅ IMPORTANT FIX

let hero = null;
let dragon = null;

/* HERO */
loader.load("./hero.glb",(glb)=>{
hero = glb.scene;
hero.scale.set(1.5,1.5,1.5);
hero.position.set(0,0,0);

hero.traverse(child=>{
if(child.isMesh) child.castShadow = true;
});

scene.add(hero);
});

/* DRAGON */
loader.load("./dragon.glb",(glb)=>{
dragon = glb.scene;
dragon.scale.set(2,2,2);
dragon.position.set(6,0,0);

dragon.traverse(child=>{
if(child.isMesh) child.castShadow = true;
});

scene.add(dragon);
});

/* ENV */
loader.load("./environment.glb",(glb)=>{
let env = glb.scene;
env.scale.set(5,5,5);
scene.add(env);
});

/* ===================== */
/* CONTROLS */
/* ===================== */

let moveX = 0;
let moveZ = 0;

document.getElementById("joy")
.addEventListener("touchmove",(e)=>{
let touch = e.touches[0];
moveX = (touch.clientX - window.innerWidth/2) * 0.001;
moveZ = (touch.clientY - window.innerHeight/2) * 0.001;
});

document.getElementById("joy")
.addEventListener("touchend",()=>{
moveX = 0;
moveZ = 0;
});

/* ATTACK */

document.getElementById("attack")
.addEventListener("touchstart",()=>{
if(hero && dragon){
let dist = hero.position.distanceTo(dragon.position);

if(dist < 4){
scene.remove(dragon);
dragon = null;
alert("🐉 Dragon Defeated!");
}
}
});

/* ===================== */
/* LOOP */
/* ===================== */

function animate(){
requestAnimationFrame(animate);

if(hero){
hero.position.x += moveX;
hero.position.z += moveZ;

camera.position.x = hero.position.x;
camera.position.z = hero.position.z + 12;
camera.lookAt(hero.position);
}

renderer.render(scene,camera);
}

animate();

/* RESIZE FIX */

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
