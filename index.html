<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti RPG</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
touch-action:none;
font-family:Arial;
}

canvas{
display:block;
width:100vw;
height:100vh;
}

/* ATTACK BUTTON */
#attackBtn{
position:absolute;
right:30px;
bottom:40px;
width:90px;
height:90px;
border-radius:50%;
border:none;
background:#ff4da6;
color:white;
font-size:18px;
font-weight:bold;
}

/* HP UI */
.ui{
position:absolute;
top:20px;
left:20px;
color:white;
}

.bar{
width:250px;
height:18px;
background:red;
margin-bottom:10px;
}

.bar-inner{
height:100%;
background:lime;
width:100%;
}
</style>
</head>
<body>

<div class="ui">
<div>PLAYER HP</div>
<div class="bar"><div id="playerHP" class="bar-inner"></div></div>

<div>DRAGON HP</div>
<div class="bar"><div id="dragonHP" class="bar-inner"></div></div>
</div>

<button id="attackBtn">⚔️</button>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ===================== */
/* LOAD IMAGES */
/* ===================== */

function loadImage(src){
let img = new Image();
img.src = src;
return img;
}

const background = loadImage("./background.png");
const heroImg = loadImage("./hero.png");
const dragonImg = loadImage("./dragon.png");
const treeImg = loadImage("./tree.png");

/* ===================== */
/* GAME OBJECTS */
/* ===================== */

const player = {
x:100,
y:canvas.height - 250,
width:150,
height:150,
hp:100,
speed:5,
cooldown:0
};

const dragon = {
x:canvas.width - 350,
y:canvas.height - 350,
width:200,
height:200,
hp:100,
speed:2,
direction:-1,
cooldown:0
};

let bullets = [];
let trees = [];

/* Spawn trees */
for(let i=0;i<6;i++){
trees.push({
x: Math.random() * canvas.width,
y: canvas.height - 220
});
}

/* ===================== */
/* CONTROLS */
/* ===================== */

let keys = {};

window.addEventListener("keydown",(e)=>{
keys[e.key] = true;
});

window.addEventListener("keyup",(e)=>{
keys[e.key] = false;
});

/* Touch move */
canvas.addEventListener("touchmove",(e)=>{
let touch = e.touches[0];
player.x = touch.clientX - player.width/2;
});

/* Attack */
document.getElementById("attackBtn")
.addEventListener("touchstart",()=>{
shoot();
});

function shoot(){
if(player.cooldown > 0) return;

bullets.push({
x:player.x + player.width,
y:player.y + 50,
speed:10
});

player.cooldown = 20;
}

/* ===================== */
/* UPDATE LOGIC */
/* ===================== */

function update(){

/* Player movement */
if(keys["a"] || keys["ArrowLeft"]){
player.x -= player.speed;
}

if(keys["d"] || keys["ArrowRight"]){
player.x += player.speed;
}

/* Cooldown */
if(player.cooldown > 0)
player.cooldown--;

/* Dragon AI */
dragon.x += dragon.speed * dragon.direction;

if(dragon.x < canvas.width/2 || dragon.x > canvas.width - 200){
dragon.direction *= -1;
}

if(dragon.cooldown > 0)
dragon.cooldown--;

/* Dragon Attack */
if(dragon.cooldown <= 0){
if(Math.abs(player.x - dragon.x) < 250){
player.hp -= 5;
dragon.cooldown = 60;
}
}

/* Bullet collision */
bullets.forEach((b,index)=>{
b.x += b.speed;

if(
b.x > dragon.x &&
b.x < dragon.x + dragon.width &&
b.y > dragon.y &&
b.y < dragon.y + dragon.height
){
dragon.hp -= 10;
bullets.splice(index,1);

if(dragon.hp <= 0){
dragon.hp = 0;
setTimeout(()=>winScreen(),500);
}
}
});

/* Player death */
if(player.hp <= 0){
loseScreen();
}

}

/* ===================== */
/* DRAW */
/* ===================== */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Background */
ctx.drawImage(background,0,0,canvas.width,canvas.height);

/* Trees */
trees.forEach(tree=>{
ctx.drawImage(treeImg,tree.x,tree.y,150,150);
});

/* Player */
ctx.drawImage(player.hp > 0 ? heroImg : heroImg,
player.x,player.y,player.width,player.height);

/* Dragon */
if(dragon.hp > 0){
ctx.drawImage(dragonImg,dragon.x,dragon.y,dragon.width,dragon.height);
}

/* Bullets */
ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,8,0,Math.PI*2);
ctx.fill();
});

/* HP UI */
document.getElementById("playerHP")
.style.width = player.hp + "%";

document.getElementById("dragonHP")
.style.width = dragon.hp + "%";

}

/* ===================== */
/* GAME LOOP */
/* ===================== */

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

/* ===================== */
/* END SCREEN */
/* ===================== */

function winScreen(){
document.body.innerHTML = `
<div style="color:white;text-align:center;margin-top:200px;">
<h1>🐉 Dragon Defeated!</h1>
<h2>Happy Birthday ❤️</h2>
</div>
`;
}

function loseScreen(){
document.body.innerHTML = `
<div style="color:red;text-align:center;margin-top:200px;">
<h1>You Died 💀</h1>
</div>
`;
}

</script>

</body>
</html>
