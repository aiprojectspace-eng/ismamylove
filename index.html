<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti Baizura ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:'Montserrat',sans-serif;
    color:white;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}

.content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:90%;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:2.4rem;
    opacity:0;
    animation:fadeIn 3s forwards 2s;
}

.name{
    font-size:2rem;
    font-weight:700;
    margin-top:10px;
    color:#ffd700;
    text-shadow:0 0 15px gold,0 0 30px orange,0 0 50px pink;
    opacity:0;
    animation:fadeIn 3s forwards 4s;
}

button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ffd700,#ff69b4);
    color:black;
    font-weight:700;
    cursor:pointer;
    opacity:0;
    animation:fadeIn 3s forwards 6s;
}

button:active{
    transform:scale(0.95);
}

.message{
    display:none;
    margin-top:25px;
    font-size:1.1rem;
    line-height:1.6;
    animation:fadeText 2s forwards;
}

.music{
    position:fixed;
    bottom:10px;
    right:10px;
    width:1px;
    height:1px;
    opacity:0;
}

@keyframes fadeIn{
    from{opacity:0; transform:translate(-50%,-40%);}
    to{opacity:1; transform:translate(-50%,-50%);}
}

@keyframes fadeText{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<div class="content">
    <h1>Happy Birthday</h1>
    <div class="name">Ismayanti Baizura ✨</div>
    <button onclick="reveal()">Open Your Universe 🌌</button>

    <div class="message" id="msg">
        Sayang,<br><br>
        Dalam berjuta bintang di langit,<br>
        I tetap pilih awak.<br><br>
        And after all this time...<br>
        you’re still the one I love ❤️<br><br>
        Terima kasih jadi isteri paling kuat,<br>
        paling sabar, dan paling cantik dalam hidup I.<br><br>
        Happy Birthday, My Queen 👑
    </div>
</div>

<!-- YouTube Music Autoplay -->
<div class="music">
<iframe width="0" height="0"
src="https://www.youtube.com/embed/KNZH-emehxA?autoplay=1&loop=1&playlist=KNZH-emehxA"
frameborder="0"
allow="autoplay">
</iframe>
</div>

<script>
const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
let shootingStars=[];

for(let i=0;i<300;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speed:Math.random()*0.6,
        depth:Math.random()*3
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();

        s.y+=s.speed*s.depth;
        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });

    shootingStars.forEach((s,i)=>{
        ctx.beginPath();
        ctx.moveTo(s.x,s.y);
        ctx.lineTo(s.x-25,s.y+25);
        ctx.strokeStyle="white";
        ctx.stroke();
        s.x+=6;
        s.y+=6;
        if(s.x>canvas.width||s.y>canvas.height){
            shootingStars.splice(i,1);
        }
    });

    if(Math.random()<0.01){
        shootingStars.push({
            x:Math.random()*canvas.width,
            y:0
        });
    }

    requestAnimationFrame(animate);
}

animate();

function reveal(){
    document.getElementById("msg").style.display="block";
    galaxyBurst();
}

function galaxyBurst(){
    for(let i=0;i<120;i++){
        stars.push({
            x:canvas.width/2,
            y:canvas.height/2,
            size:Math.random()*3,
            speed:Math.random()*2,
            depth:Math.random()*4
        });
    }
}

canvas.addEventListener("touchmove",function(e){
    let touch=e.touches[0];
    stars.push({
        x:touch.clientX,
        y:touch.clientY,
        size:2,
        speed:1,
        depth:3
    });
});
</script>

</body>
</html>
