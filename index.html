<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti Ultimate Fight</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
font-family:Arial;
}

canvas{
display:block;
}

#attackBtn{
position:absolute;
right:30px;
bottom:40px;
width:100px;
height:100px;
border-radius:50%;
border:none;
background:red;
color:white;
font-size:18px;
font-weight:bold;
}

.ui{
position:absolute;
top:20px;
left:20px;
color:white;
}

.bar{
width:250px;
height:20px;
background:red;
margin-bottom:10px;
}

.bar-inner{
height:100%;
background:lime;
width:100%;
}
</style>
</head>
<body>

<div class="ui">
<div>PLAYER</div>
<div class="bar"><div id="playerHP" class="bar-inner"></div></div>

<div>ENEMY</div>
<div class="bar"><div id="enemyHP" class="bar-inner"></div></div>
</div>

<button id="attackBtn">⚔</button>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ===================== */
/* GAME OBJECTS */
/* ===================== */

const player = {
x:100,
y:canvas.height - 250,
width:180,
height:180,
hp:100,
state:"idle",
cooldown:0,
facing:1
};

const enemy = {
x:canvas.width - 300,
y:canvas.height - 300,
width:200,
height:200,
hp:100,
state:"idle",
cooldown:0,
facing:-1
};

/* ===================== */
/* LOAD SPRITE SHEETS */
/* ===================== */

function loadImage(src){
let img = new Image();
img.src = src;
return img;
}

/*
👉 Upload sprite sheet later:
player.png
enemy.png
*/

const playerSprite = loadImage("player.png");
const enemySprite = loadImage("enemy.png");

/* ===================== */
/* CONTROLS */
/* ===================== */

let keys = {};

window.addEventListener("keydown",(e)=>{
keys[e.key] = true;
});

window.addEventListener("keyup",(e)=>{
keys[e.key] = false;
});

document.getElementById("attackBtn")
.addEventListener("touchstart",()=>{
attack();
});

/* ===================== */
/* COMBAT SYSTEM */
/* ===================== */

function attack(){

if(player.cooldown > 0) return;

player.state = "attack";
player.cooldown = 30;

/* Hit detection */
if(Math.abs(player.x - enemy.x) < 200){

enemy.hp -= 15;
enemy.state = "hit";

if(enemy.hp <= 0){
enemy.hp = 0;
enemy.state = "dead";
}
}

}

/* ===================== */
/* UPDATE */
/* ===================== */

function update(){

/* Movement */
if(keys["a"]){
player.x -= 5;
player.state = "walk";
player.facing = -1;
}

if(keys["d"]){
player.x += 5;
player.state = "walk";
player.facing = 1;
}

if(!keys["a"] && !keys["d"] && player.state !== "attack"){
player.state = "idle";
}

/* Cooldown */
if(player.cooldown > 0)
player.cooldown--;

/* Enemy AI */
if(enemy.hp > 0){

enemy.x += enemy.facing * 2;

if(enemy.x < canvas.width/2 || enemy.x > canvas.width - 200){
enemy.facing *= -1;
}

if(Math.abs(enemy.x - player.x) < 150 && enemy.cooldown <= 0){
player.hp -= 5;
enemy.cooldown = 60;
enemy.state = "attack";
}

if(enemy.cooldown > 0)
enemy.cooldown--;

}

/* Player death */
if(player.hp <= 0){
player.state = "dead";
}

}

/* ===================== */
/* DRAW (ANIMATION ENGINE) */
/* ===================== */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Background */
ctx.fillStyle="#1a1a2e";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* DRAW PLAYER */
ctx.save();
ctx.translate(player.x,player.y);
ctx.scale(player.facing,1);

ctx.drawImage(playerSprite, -player.width/2, -player.height/2, player.width, player.height);

ctx.restore();

/* DRAW ENEMY */
if(enemy.hp > 0){
ctx.save();
ctx.translate(enemy.x,enemy.y);
ctx.scale(enemy.facing,1);

ctx.drawImage(enemySprite, -enemy.width/2, -enemy.height/2, enemy.width, enemy.height);

ctx.restore();
}

/* HP BAR */
document.getElementById("playerHP").style.width = player.hp + "%";
document.getElementById("enemyHP").style.width = enemy.hp + "%";

}

/* ===================== */
/* GAME LOOP */
/* ===================== */

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
