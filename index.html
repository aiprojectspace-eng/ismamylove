<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti 3D RPG</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
}

canvas{
display:block;
}

/* JOYSTICK */
#joy{
position:absolute;
left:30px;
bottom:40px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.2);
}

/* ATTACK BUTTON */
#attack{
position:absolute;
right:30px;
bottom:40px;
width:80px;
height:80px;
border-radius:50%;
border:none;
background:#ff4da6;
color:white;
font-size:20px;
font-weight:bold;
}
</style>

</head>
<body>

<!-- UI -->
<div id="joy"></div>
<button id="attack">⚔️</button>

<!-- THREE JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/loaders/GLTFLoader.js"></script>

<!-- GAME LOGIC -->
<script src="./game.js"></script>

</body>
</html>
