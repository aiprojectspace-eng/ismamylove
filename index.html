<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti RPG 2D Pro</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
touch-action:none;
font-family:Arial;
}

canvas{
display:block;
}

#attackBtn{
position:absolute;
right:30px;
bottom:40px;
width:90px;
height:90px;
border-radius:50%;
border:none;
background:#ff4da6;
color:white;
font-size:18px;
font-weight:bold;
}

#hpBar{
position:absolute;
top:20px;
left:20px;
width:250px;
height:20px;
background:red;
}

#hpFill{
height:100%;
width:100%;
background:lime;
}
</style>
</head>
<body>

<div id="hpBar"><div id="hpFill"></div></div>
<button id="attackBtn">⚔️</button>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ================= */
/* GAME OBJECTS */
/* ================= */

const hero = {
x:100,
y:canvas.height-200,
width:60,
height:80,
speed:5,
cooldown:0
};

const dragon = {
x:canvas.width-200,
y:canvas.height-250,
width:120,
height:120,
hp:100,
speed:2,
direction:-1
};

let projectiles = [];

/* ================= */
/* TOUCH MOVE */
/* ================= */

canvas.addEventListener("touchmove",(e)=>{
let touch = e.touches[0];
hero.x = touch.clientX - hero.width/2;
});

/* ================= */
/* ATTACK SYSTEM (WITH COOLDOWN) */
/* ================= */

document.getElementById("attackBtn")
.addEventListener("touchstart",()=>{
if(hero.cooldown <= 0){
shoot();
hero.cooldown = 30;
}
});

function shoot(){
projectiles.push({
x:hero.x + hero.width,
y:hero.y + 30,
speed:8
});
}

/* ================= */
/* UPDATE GAME LOGIC */
/* ================= */

function update(){

/* Hero cooldown */
if(hero.cooldown > 0){
hero.cooldown--;
}

/* Dragon AI movement */
dragon.x += dragon.speed * dragon.direction;

if(dragon.x < canvas.width/2 || dragon.x > canvas.width-150){
dragon.direction *= -1;
}

/* Projectile movement */
projectiles.forEach((bullet,index)=>{
bullet.x += bullet.speed;

/* Collision */
if(
bullet.x > dragon.x &&
bullet.x < dragon.x + dragon.width &&
bullet.y > dragon.y &&
bullet.y < dragon.y + dragon.height
){
dragon.hp -= 10;
projectiles.splice(index,1);

if(dragon.hp <= 0){
dragon.hp = 0;
setTimeout(()=>showVictory(),500);
}
}
});

}

/* ================= */
/* DRAW */
/* ================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Background */
ctx.fillStyle="#1e1e2f";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* HERO */
ctx.fillStyle="#ff66cc";
ctx.fillRect(hero.x,hero.y,hero.width,hero.height);

/* Dragon */
if(dragon.hp > 0){
ctx.fillStyle="#9933ff";
ctx.fillRect(dragon.x,dragon.y,dragon.width,dragon.height);

/* Dragon HP */
ctx.fillStyle="red";
ctx.fillRect(dragon.x,dragon.y-20,120,10);

ctx.fillStyle="lime";
ctx.fillRect(dragon.x,dragon.y-20,dragon.hp/100*120,10);
}

/* Projectiles */
ctx.fillStyle="yellow";
projectiles.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,8,0,Math.PI*2);
ctx.fill();
});

/* HP BAR */
document.getElementById("hpFill")
.style.width = dragon.hp + "%";

}

/* ================= */
/* GAME LOOP */
/* ================= */

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

/* ================= */
/* WIN SCREEN */
/* ================= */

function showVictory(){

document.body.innerHTML = `
<div style="color:white;text-align:center;margin-top:200px;">
<h1>🐉 Dragon Defeated!</h1>
<h2>Happy Birthday Ismayanti ❤️</h2>
<p>Level Completed.</p>
</div>
`;

}

</script>

</body>
</html>
