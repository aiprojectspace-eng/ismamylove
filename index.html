<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Birthday Racing Untuk Sayangku Ismayanti Baizura</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Segoe UI,sans-serif;
color:white;
touch-action:none;
}

canvas{display:block;}

#driver{
position:absolute;
top:15px;
left:15px;
font-weight:bold;
color:#ff4757;
z-index:2;
font-size:14px;
}

#scoreUI{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:26px;
font-weight:900;
text-shadow:0 0 10px #ff4757;
z-index:2;
}

#overlay{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
text-align:center;
padding:30px;
}

button{
padding:16px 36px;
font-size:18px;
border:none;
border-radius:40px;
background:#ff4757;
color:white;
margin-top:25px;
}

#celebration{
position:absolute;
top:0;
left:0;
pointer-events:none;
z-index:5;
}
</style>
</head>
<body>

<div id="driver">Driver: Ismayanti Baizura 🏎️</div>
<div id="scoreUI">❤️ <span id="score">0</span> / 15</div>

<div id="overlay">
<h1 style="color:#ff4757;">Ismayanti Baizura ❤️</h1>

<p>
In Our Life...<br><br>
I tetap pilih you.
</p>

<button id="startBtn">Start 🚗❤️</button>
</div>

<canvas id="game"></canvas>
<canvas id="celebration"></canvas>

<script>

/* ================= CORE ================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const ccanvas=document.getElementById("celebration");
const cctx=ccanvas.getContext("2d");

const overlay=document.getElementById("overlay");
const startBtn=document.getElementById("startBtn");
const scoreEl=document.getElementById("score");

let running=false;
let celebrating=false;
let score=0;

let items=[];
let sparkles=[];
let floatingTexts=[];
let confetti=[];
let fireworks=[];
let roadOffset=0;

/* ================= AUDIO ================= */

const collectSound=new Audio("collect.mp3");
const hitSound=new Audio("hit.mp3");
const winSound=new Audio("win.mp3");
const bgMusic=new Audio("bgmusic.mp3");

bgMusic.loop=true;
bgMusic.volume=0.4;

/* ================= RESIZE ================= */

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
ccanvas.width=window.innerWidth;
ccanvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* ================= CAR ================= */

const carImg=new Image();
carImg.src="saga_blm.png";

let car={lane:1,w:70,h:130,x:0,y:0};

function updateCar(){
let laneW=canvas.width/3;
car.x=(car.lane*laneW)+(laneW/2)-(car.w/2);
car.y=canvas.height-180;
}
updateCar();

/* ================= TOUCH + KEY ================= */

window.addEventListener("touchstart",(e)=>{
if(!running)return;
let x=e.touches[0].clientX;
if(x<canvas.width/2 && car.lane>0) car.lane--;
if(x>canvas.width/2 && car.lane<2) car.lane++;
updateCar();
});

window.addEventListener("keydown",(e)=>{
if(!running) return;
if(e.key==="ArrowLeft" || e.key==="a"){
if(car.lane>0){car.lane--;updateCar();}
}
if(e.key==="ArrowRight" || e.key==="d"){
if(car.lane<2){car.lane++;updateCar();}
}
});

/* ================= EFFECTS ================= */

function createSparkle(x,y){
for(let i=0;i<10;i++){
sparkles.push({
x,y,
dx:(Math.random()-0.5)*5,
dy:(Math.random()-0.5)*5,
alpha:1
});
}
}

function createFloatingText(x,y){
let words=["Good job ❤️","Kuat sayang!","Proud of you 😘","Keep going!"];
floatingTexts.push({
x,y,
text:words[Math.floor(Math.random()*words.length)],
alpha:1
});
}

function createConfetti(){
confetti.length=0;
for(let i=0;i<150;i++){
confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*-canvas.height,
size:4+Math.random()*4,
speed:2+Math.random()*3,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
}

function createFirework(){
let cx=Math.random()*canvas.width;
let cy=Math.random()*canvas.height/2;
for(let i=0;i<70;i++){
fireworks.push({
x:cx,
y:cy,
dx:(Math.random()-0.5)*9,
dy:(Math.random()-0.5)*9,
alpha:1,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
}

/* ================= SPAWN ================= */

function spawn(){
items.push({
lane:Math.floor(Math.random()*3),
y:-50,
good:Math.random()>0.4
});
}

/* ================= WIN ================= */

function win(){
running=false;
celebrating=true;
bgMusic.pause();
winSound.play();

createConfetti();
createFirework();

overlay.style.display="flex";
overlay.innerHTML=`
<h1 style='color:#ff4757;'>Happy Birthday Sayang 🎂❤️</h1>
<p>You're my HOME my LIFE ❤️</p>
<button onclick="location.reload()">Play Again 🚗</button>
`;

celebrationLoop();
}

/* ================= GAME LOOP ================= */

function gameLoop(){
if(!running) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Background */
let grad=ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,"#0f0f0f");
grad.addColorStop(1,"#1f1f1f");
ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* Road */
let laneW=canvas.width/3;
roadOffset+=6;

ctx.strokeStyle="rgba(255,255,255,.2)";
ctx.setLineDash([30,40]);
ctx.lineDashOffset=-roadOffset;
ctx.beginPath();
ctx.moveTo(laneW,0);
ctx.lineTo(laneW,canvas.height);
ctx.moveTo(laneW*2,0);
ctx.lineTo(laneW*2,canvas.height);
ctx.stroke();
ctx.setLineDash([]);

/* Car */
ctx.drawImage(carImg,car.x,car.y,car.w,car.h);

/* Spawn */
if(Math.random()<0.03) spawn();

/* Items */
for(let i=items.length-1;i>=0;i--){
let it=items[i];
it.y+=6;
let x=(it.lane*(canvas.width/3))+(canvas.width/6);

ctx.font="40px Arial";
ctx.textAlign="center";
ctx.fillText(it.good?"❤️":"💢",x,it.y);

if(it.y>car.y && it.y<car.y+car.h && it.lane===car.lane){

if(it.good){
score++;
scoreEl.innerText=score;
collectSound.currentTime=0;
collectSound.play();

/* EFFECT TRIGGER */
createSparkle(car.x+car.w/2,car.y);
createFloatingText(car.x+car.w/2,car.y-20);

if(score>=15) win();
}
else{
hitSound.currentTime=0;
hitSound.play();
}

items.splice(i,1);
}
if(it.y>canvas.height) items.splice(i,1);
}

/* RENDER SPARKLES */
for(let i=sparkles.length-1;i>=0;i--){
let s=sparkles[i];
s.x+=s.dx;
s.y+=s.dy;
s.alpha-=0.03;
ctx.globalAlpha=s.alpha;
ctx.fillStyle="#ff4757";
ctx.beginPath();
ctx.arc(s.x,s.y,3,0,Math.PI*2);
ctx.fill();
ctx.globalAlpha=1;
if(s.alpha<=0) sparkles.splice(i,1);
}

/* RENDER FLOATING TEXT */
for(let i=floatingTexts.length-1;i>=0;i--){
let ft=floatingTexts[i];
ft.y-=1.5;
ft.alpha-=0.02;
ctx.globalAlpha=ft.alpha;
ctx.fillStyle="#ff4757";
ctx.font="bold 18px Segoe UI";
ctx.textAlign="center";
ctx.fillText(ft.text,ft.x,ft.y);
ctx.globalAlpha=1;
if(ft.alpha<=0) floatingTexts.splice(i,1);
}

requestAnimationFrame(gameLoop);
}

/* ================= CELEBRATION ================= */

function celebrationLoop(){
if(!celebrating) return;

cctx.clearRect(0,0,ccanvas.width,ccanvas.height);

/* CONFETTI */
for(let i=confetti.length-1;i>=0;i--){
let c=confetti[i];
c.y+=c.speed;
cctx.fillStyle=c.color;
cctx.fillRect(c.x,c.y,c.size,c.size);
if(c.y>ccanvas.height) confetti.splice(i,1);
}

/* FIREWORK */
for(let i=fireworks.length-1;i>=0;i--){
let f=fireworks[i];
f.x+=f.dx;
f.y+=f.dy;
f.alpha-=0.02;
cctx.globalAlpha=f.alpha;
cctx.fillStyle=f.color;
cctx.beginPath();
cctx.arc(f.x,f.y,2,0,Math.PI*2);
cctx.fill();
cctx.globalAlpha=1;
if(f.alpha<=0) fireworks.splice(i,1);
}

if(Math.random()<0.05){
createFirework();
}

requestAnimationFrame(celebrationLoop);
}

/* ================= START ================= */

startBtn.onclick=()=>{
overlay.style.display="none";
bgMusic.play();
running=true;
gameLoop();
};

</script>
</body>
</html>
