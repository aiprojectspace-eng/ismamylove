<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Chibi Fight</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
touch-action:none;
font-family:Arial;
}

canvas{
display:block;
}

#attackBtn{
position:absolute;
right:30px;
bottom:40px;
width:100px;
height:100px;
border-radius:50%;
border:none;
background:red;
color:white;
font-size:20px;
font-weight:bold;
}

.ui{
position:absolute;
top:20px;
left:20px;
color:white;
}

.bar{
width:250px;
height:20px;
background:red;
margin-bottom:10px;
}

.bar-inner{
height:100%;
background:lime;
width:100%;
}
</style>
</head>
<body>

<div class="ui">
<div>PLAYER</div>
<div class="bar"><div id="playerHP" class="bar-inner"></div></div>

<div>ENEMY</div>
<div class="bar"><div id="enemyHP" class="bar-inner"></div></div>
</div>

<button id="attackBtn">⚔</button>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ================= */
/* LOAD SPRITE */
/* ================= */

const sprite = new Image();
sprite.src = "player.png";

/*
ASSUMPTION:
Sprite sheet grid = 4 columns
Frame size = 256 x 256
*/

const frameWidth = 256;
const frameHeight = 256;

let frameX = 0;
let frameY = 0;
let frameTimer = 0;

/* ================= */
/* PLAYER DATA */
/* ================= */

const player = {
x:150,
y:canvas.height-300,
hp:100,
state:"idle",
cooldown:0,
facing:1
};

const enemy = {
x:canvas.width-300,
y:canvas.height-300,
hp:100,
speed:2,
direction:-1
};

let keys = {};

/* ================= */
/* CONTROLS */
/* ================= */

window.addEventListener("keydown",(e)=>{
keys[e.key] = true;
});

window.addEventListener("keyup",(e)=>{
keys[e.key] = false;
});

document.getElementById("attackBtn")
.addEventListener("touchstart",()=>{
attack();
});

/* ================= */
/* ATTACK SYSTEM */
/* ================= */

function attack(){

if(player.cooldown > 0) return;

player.state = "attack";
player.cooldown = 30;

if(Math.abs(player.x - enemy.x) < 250){
enemy.hp -= 10;
if(enemy.hp <= 0){
enemy.hp = 0;
enemy.state = "dead";
}
}
}

/* ================= */
/* UPDATE */
/* ================= */

function update(){

/* Movement */
if(keys["a"]){
player.x -= 5;
player.state = "walk";
player.facing = -1;
}

if(keys["d"]){
player.x += 5;
player.state = "walk";
player.facing = 1;
}

if(!keys["a"] && !keys["d"] && player.state !== "attack"){
player.state = "idle";
}

/* Cooldown */
if(player.cooldown > 0)
player.cooldown--;

/* Enemy AI */
enemy.x += enemy.speed * enemy.direction;

if(enemy.x < canvas.width/2 || enemy.x > canvas.width - 200){
enemy.direction *= -1;
}

/* Enemy Attack */
if(Math.abs(enemy.x - player.x) < 200){
player.hp -= 0.05;
}

if(player.hp <= 0){
player.hp = 0;
player.state = "dead";
}

}

/* ================= */
/* ANIMATION SYSTEM */
/* ================= */

function animateSprite(state){

/*
Frame Layout:
Row 0 = idle
Row 1 = walk
Row 2 = attack
Row 3 = dead
*/

if(state === "idle") frameY = 0;
if(state === "walk") frameY = 1;
if(state === "attack") frameY = 2;
if(state === "dead") frameY = 3;

/* Frame animation */
frameTimer++;

if(frameTimer > 10){
frameX++;
frameTimer = 0;
}

/* Loop 4 columns */
if(frameX > 3){
frameX = 0;
}

ctx.save();
ctx.translate(player.x,player.y);
ctx.scale(player.facing,1);

ctx.drawImage(
sprite,
frameX * frameWidth,
frameY * frameHeight,
frameWidth,
frameHeight,
-frameWidth/2,
-frameHeight/2,
frameWidth,
frameHeight
);

ctx.restore();

}

/* ================= */
/* DRAW */
/* ================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#1a1a1a";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* Draw Player Animation */
animateSprite(player.state);

/* Draw Enemy */
ctx.fillStyle="purple";
ctx.fillRect(enemy.x,enemy.y,150,150);

/* HP UI */
document.getElementById("playerHP")
.style.width = player.hp + "%";

document.getElementById("enemyHP")
.style.width = enemy.hp + "%";

}

/* ================= */
/* LOOP */
/* ================= */

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
