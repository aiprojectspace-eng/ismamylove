<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saga BLM Birthday Sprint!</title>
    <style>
        /* CSS untuk nampak macam game mobile */
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; background: #333; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: white; font-size: 24px; font-weight: bold; pointer-events: none; 
            text-shadow: 2px 2px 0px #ff4757;
        }

        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center; padding: 30px; box-sizing: border-box; z-index: 10;
        }

        .btn { 
            padding: 15px 40px; font-size: 22px; cursor: pointer; 
            background: #ff4757; color: white; border: none; 
            border-radius: 50px; margin-top: 20px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        h1 { color: #ff4757; margin-bottom: 5px; font-size: 2.5rem; }
        p { font-size: 1.1rem; line-height: 1.5; color: #ccc; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui">LOVE: <span id="score">0</span> / 10</div>

    <div id="overlay">
        <h1 id="msg-title">Saga BLM: Birthday Race 🏎️</h1>
        <p id="msg-p">Sayang, tap <b>KIRI</b> atau <b>KANAN</b> skrin untuk elak 'STRESS' dan kutip 10 'LOVE'!</p>
        <button class="btn" onclick="startGame()">START ENGINE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const msgTitle = document.getElementById('msg-title');
        const msgP = document.getElementById('msg-p');

        // Game State
        let gameRunning = false;
        let score = 0;
        let frame = 0;
        let items = [];
        let speed = 6;

        // Load Car Image
        const carImg = new Image();
        carImg.src = 'saga_blm.png'; // Pastikan file ni ada kat repo kau

        // Car Object
        let car = {
            lane: 1, // 0: Kiri, 1: Tengah, 2: Kanan
            w: 60,   // Lebar kereta
            h: 110,  // Tinggi kereta
            x: 0,
            y: 0
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            car.y = canvas.height - 150;
            updateCarX();
        }

        function updateCarX() {
            const laneWidth = canvas.width / 3;
            car.x = (car.lane * laneWidth) + (laneWidth / 2) - (car.w / 2);
        }

        window.addEventListener('resize', resize);
        resize();

        // Control: Tap Kiri/Kanan
        window.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            const touchX = e.touches[0].clientX;
            if (touchX < canvas.width / 2) {
                if (car.lane > 0) car.lane--;
            } else {
                if (car.lane < 2) car.lane++;
            }
            updateCarX();
        });

        function spawnItem() {
            const lane = Math.floor(Math.random() * 3);
            const isLove = Math.random() > 0.4; // 60% chance Love, 40% Stress
            items.push({
                lane: lane,
                y: -100,
                type: isLove ? '❤️' : '💢',
                isGood: isLove
            });
        }

        function startGame() {
            score = 0;
            items = [];
            gameRunning = true;
            overlay.classList.add('hidden');
            scoreEl.innerText = score;
            animate();
        }

        function winGame() {
            gameRunning = false;
            overlay.classList.remove('hidden');
            msgTitle.innerText = "SELAMAT HARI LAHIR SAYANG! ❤️";
            msgP.innerHTML = "Saga BLM ni dah sampai ke hati awak!<br><br>Terima kasih sebab sentiasa ada dengan saya. I love you so much! 🎂🌹";
            document.querySelector('.btn').innerText = "REPLAY";
        }

        function animate() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Road Lines
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.setLineDash([20, 30]);
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(canvas.width/3, 0); ctx.lineTo(canvas.width/3, canvas.height);
            ctx.moveTo(2*canvas.width/3, 0); ctx.lineTo(2*canvas.width/3, canvas.height);
            ctx.stroke();

            // Draw Saga BLM
            if (carImg.complete) {
                ctx.drawImage(carImg, car.x, car.y, car.w, car.h);
            } else {
                // Fallback kalau gambar tak load
                ctx.fillStyle = "red";
                ctx.fillRect(car.x, car.y, car.w, car.h);
            }

            // Spawn & Move Items
            if (frame % 50 === 0) spawnItem();
            
            ctx.font = "40px Arial";
            ctx.textAlign = "center";

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += speed;
                
                const laneWidth = canvas.width / 3;
                let itemX = (it.lane * laneWidth) + (laneWidth / 2);
                
                ctx.fillText(it.type, itemX, it.y);

                // Collision Detection (Hitbox)
                if (it.y > car.y && it.y < car.y + car.h) {
                    if (it.lane === car.lane) {
                        if (it.isGood) {
                            score++;
                            scoreEl.innerText = score;
                            if (score >= 10) winGame();
                        } else {
                            score = Math.max(0, score - 1);
                            scoreEl.innerText = score;
                        }
                        items.splice(i, 1);
                    }
                }

                // Remove off-screen items
                if (it.y > canvas.height) items.splice(i, 1);
            }

            frame++;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
