<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Birthday Racing Untuk Sayangku Ismayanti Baizura</title>

<style>

body{
margin:0;
overflow:hidden;
background:#0f0f0f;
font-family:Segoe UI;
color:white;
touch-action:none;
}

canvas{
display:block;
background:#1a1a1a;
}

#driver{
position:absolute;
top:15px;
left:15px;
font-weight:bold;
color:#ff4757;
}

#scoreUI{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:34px;
font-weight:900;
text-shadow:0 0 10px #ff4757;
}

#praise{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
color:#feca57;
opacity:0;
transition:.3s;
}

#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

.panel{
background:rgba(255,255,255,.05);
padding:40px;
border-radius:25px;
text-align:center;
border:1px solid #ff4757;
}

button{
padding:18px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff4757;
color:white;
margin-top:20px;
}

#countdown{
font-size:80px;
font-weight:900;
color:#ff4757;
margin-top:20px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div id="driver">Driver: Ismayanti Baizura 🏎️</div>
<div id="scoreUI">❤️ <span id="score">0</span> / 15</div>
<div id="praise"></div>

<div id="overlay">
<div class="panel">

<h1 style="color:#ff4757">Drive Elok2 Tau Kete Saga Sampan I Ni</h1>

<p>
Elak STRESS 💢<br>
Kutip LOVE ❤️<br><br>
Tap Left / Right
</p>

<button id="startBtn">Start Engine</button>

<div id="countdown"></div>

</div>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const scoreEl=document.getElementById("score")
const praise=document.getElementById("praise")
const overlay=document.getElementById("overlay")
const startBtn=document.getElementById("startBtn")
const countdown=document.getElementById("countdown")

let running=false
let score=0
let frame=0
let items=[]
let particles=[]
let confetti=[]
let speed=6
let roadOffset=0

/* AUDIO */

const collectSound=new Audio("collect.mp3")
const hitSound=new Audio("hit.mp3")
const winSound=new Audio("win.mp3")
const bgMusic=new Audio("bgmusic.mp3")

bgMusic.loop=true
bgMusic.volume=0.4

/* PRAISE TEXT */

const praises=[
"Nice Sayang!",
"Good Job Yang!",
"Power!",
"Sikit Lagi!",
"Sayang Laju!",
"Yahoo!",
"Racing Queen!"
]

/* CAR */

const carImg=new Image()
carImg.src="saga_blm.png"

let car={
lane:1,
w:70,
h:130,
x:0,
y:0
}

function resize(){

canvas.width=window.innerWidth
canvas.height=window.innerHeight

car.y=canvas.height-190
updateCar()

}

function updateCar(){

let laneW=canvas.width/3
car.x=(car.lane*laneW)+(laneW/2)-(car.w/2)

}

window.addEventListener("resize",resize)
resize()

/* TOUCH CONTROL */

window.addEventListener("touchstart",(e)=>{

if(!running)return

let x=e.touches[0].clientX

if(x<canvas.width/2){

if(car.lane>0)car.lane--

}else{

if(car.lane<2)car.lane++

}

updateCar()

})

/* PRAISE */

function showPraise(){

praise.innerText=praises[Math.floor(Math.random()*praises.length)]
praise.style.opacity=1

setTimeout(()=>{

praise.style.opacity=0

},800)

}

/* SPAWN */

function spawn(){

let lane=Math.floor(Math.random()*3)
let good=Math.random()>0.4

items.push({

lane:lane,
y:-100,
type:good?"❤️":"💢",
good:good

})

}

/* PARTICLES */

function makeParticles(x,y){

for(let i=0;i<8;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:40

})

}

}

/* CONFETTI */

function makeConfetti(){

for(let i=0;i<200;i++){

confetti.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vy:Math.random()*4+2

})

}

}

/* START */

startBtn.onclick=()=>{

startBtn.style.display="none"

bgMusic.play()

startCountdown()

}

function startCountdown(){

let c=5

countdown.innerText=c

let timer=setInterval(()=>{

c--
countdown.innerText=c

if(c==0){

clearInterval(timer)

overlay.classList.add("hidden")

running=true
animate()

}

},1000)

}

/* WIN */

function win(){

running=false

bgMusic.pause()
winSound.play()

makeConfetti()

overlay.classList.remove("hidden")

document.querySelector("h1").innerHTML="SELAMAT HARI LAHIR SAYANG 🎂"
countdown.innerText="I LOVE YOU ❤️"

}

/* ROAD */

function drawRoad(){

let w=canvas.width
let h=canvas.height
let lane=w/3

roadOffset+=speed

if(roadOffset>100)roadOffset=0

ctx.strokeStyle="rgba(255,255,255,.1)"
ctx.setLineDash([40,60])

ctx.beginPath()

ctx.moveTo(lane,roadOffset-100)
ctx.lineTo(lane,h+100)

ctx.moveTo(lane*2,roadOffset-100)
ctx.lineTo(lane*2,h+100)

ctx.stroke()

ctx.setLineDash([])

}

/* GAME LOOP */

function animate(){

if(!running && confetti.length==0)return

ctx.clearRect(0,0,canvas.width,canvas.height)

drawRoad()

if(carImg.complete){

ctx.drawImage(carImg,car.x,car.y,car.w,car.h)

}

/* GAME LOGIC */

if(running){

frame++

if(score>5)speed=8
if(score>10)speed=11

if(frame%(60-score*2)==0)spawn()

}

/* ITEMS */

for(let i=items.length-1;i>=0;i--){

let it=items[i]

it.y+=speed

let x=(it.lane*(canvas.width/3))+(canvas.width/6)

ctx.font="45px Arial"
ctx.textAlign="center"

ctx.fillText(it.type,x,it.y)

if(running && it.y>car.y && it.y<car.y+car.h && it.lane==car.lane){

if(it.good){

score++
scoreEl.innerText=score

collectSound.currentTime=0
collectSound.play()

makeParticles(x,it.y)

showPraise()

if(score>=15)win()

}else{

score=Math.max(0,score-1)
scoreEl.innerText=score

hitSound.currentTime=0
hitSound.play()

navigator.vibrate?.(100)

}

items.splice(i,1)

}

if(it.y>canvas.height)items.splice(i,1)

}

/* PARTICLES */

for(let i=particles.length-1;i>=0;i--){

let p=particles[i]

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.fillStyle="#ff6b81"

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fill()

if(p.life<=0)particles.splice(i,1)

}

/* CONFETTI */

for(let i=confetti.length-1;i>=0;i--){

let c=confetti[i]

c.y+=c.vy

ctx.fillStyle="hsl("+Math.random()*360+",80%,60%)"
ctx.fillRect(c.x,c.y,6,6)

if(c.y>canvas.height)confetti.splice(i,1)

}

requestAnimationFrame(animate)

}

</script>

</body>
</html>
