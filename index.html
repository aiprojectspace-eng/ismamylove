<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ismayanti RPG 2D Improved</title>

<style>
body{
margin:0;
overflow:hidden;
background:#0f0f1a;
touch-action:none;
font-family:Arial;
color:white;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:20px;
left:20px;
}

.bar{
width:250px;
height:18px;
background:red;
margin-bottom:10px;
}

.bar-inner{
height:100%;
background:lime;
}

#attackBtn{
position:absolute;
right:30px;
bottom:40px;
width:90px;
height:90px;
border-radius:50%;
border:none;
background:#ff4da6;
color:white;
font-size:18px;
font-weight:bold;
}
</style>
</head>
<body>

<div id="ui">
<div>PLAYER HP</div>
<div class="bar"><div id="playerHP" class="bar-inner"></div></div>

<div>DRAGON HP</div>
<div class="bar"><div id="dragonHP" class="bar-inner"></div></div>
</div>

<button id="attackBtn">⚔️</button>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ================= */
/* GAME OBJECTS */
/* ================= */

const player = {
x:100,
y:canvas.height-200,
width:60,
height:80,
hp:100,
speed:4,
attackCooldown:0
};

const dragon = {
x:canvas.width-200,
y:canvas.height-250,
width:120,
height:120,
hp:100,
speed:2,
attackCooldown:0
};

let bullets = [];

/* ================= */
/* CONTROLS */
/* ================= */

let keys = {};

window.addEventListener("keydown",e=>{
keys[e.key] = true;
});

window.addEventListener("keyup",e=>{
keys[e.key] = false;
});

/* TOUCH MOVE */
canvas.addEventListener("touchmove",(e)=>{
let touch = e.touches[0];
player.x = touch.clientX - player.width/2;
});

/* ATTACK BUTTON */
document.getElementById("attackBtn")
.addEventListener("touchstart",()=>{
shoot();
});

/* ================= */
/* COMBAT */
/* ================= */

function shoot(){
if(player.attackCooldown > 0) return;

bullets.push({
x:player.x + player.width,
y:player.y + 30,
speed:10
});

player.attackCooldown = 20;
}

/* Dragon attack */
function dragonAttack(){
if(dragon.attackCooldown > 0) return;

if(Math.abs(player.x - dragon.x) < 200){

player.hp -= 10;
dragon.attackCooldown = 60;
}
}

/* ================= */
/* UPDATE LOGIC */
/* ================= */

function update(){

/* Player movement */
if(keys["a"]) player.x -= player.speed;
if(keys["d"]) player.x += player.speed;

if(player.attackCooldown > 0)
player.attackCooldown--;

/* Dragon AI movement */
dragon.x += dragon.speed;

if(dragon.x > canvas.width - 100 || dragon.x < canvas.width/2){
dragon.speed *= -1;
}

/* Dragon attack timer */
if(dragon.attackCooldown > 0)
dragon.attackCooldown--;

dragonAttack();

/* Bullet collision */
bullets.forEach((b,index)=>{
b.x += b.speed;

/* Collision */
if(
b.x > dragon.x &&
b.x < dragon.x + dragon.width &&
b.y > dragon.y &&
b.y < dragon.y + dragon.height
){
dragon.hp -= 10;
bullets.splice(index,1);

if(dragon.hp <= 0){
dragon.hp = 0;
setTimeout(()=>winScreen(),500);
}
}
});

/* Player death */
if(player.hp <= 0){
loseScreen();
}
}

/* ================= */
/* DRAW */
/* ================= */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Background */
ctx.fillStyle="#1a1a2e";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* Player */
ctx.fillStyle="#ff66cc";
ctx.fillRect(player.x,player.y,player.width,player.height);

/* Dragon */
if(dragon.hp > 0){
ctx.fillStyle="#9933ff";
ctx.fillRect(dragon.x,dragon.y,dragon.width,dragon.height);
}

/* Bullets */
ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,8,0,Math.PI*2);
ctx.fill();
});

/* UI Bars */
document.getElementById("playerHP")
.style.width = player.hp + "%";

document.getElementById("dragonHP")
.style.width = dragon.hp + "%";
}

/* ================= */
/* GAME LOOP */
/* ================= */

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

/* ================= */
/* WIN / LOSE SCREEN */
/* ================= */

function winScreen(){
document.body.innerHTML = `
<div style="text-align:center;margin-top:200px;">
<h1>🐉 Dragon Defeated!</h1>
<h2>Happy Birthday Ismayanti ❤️</h2>
<p>You protected your kingdom.</p>
</div>
`;
}

function loseScreen(){
document.body.innerHTML = `
<div style="text-align:center;margin-top:200px;color:red;">
<h1>💀 You Died</h1>
<p>Try again warrior.</p>
</div>
`;
}

</script>

</body>
</html>
