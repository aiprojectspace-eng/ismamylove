<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saga BLM: Birthday Sprint!</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #0f0f0f; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none; 
            color: white;
        }

        canvas { 
            display: block; 
            background: #1a1a1a; 
            margin: 0 auto; 
            box-shadow: 0 0 50px rgba(255, 71, 87, 0.2); 
        }
        
        #ui { 
            position: absolute; 
            top: 25px; 
            width: 100%; 
            text-align: center; 
            font-size: 32px; 
            font-weight: 900; 
            pointer-events: none; 
            color: #fff;
            text-shadow: 0 0 10px #ff4757, 0 0 20px #ff4757;
            z-index: 5;
        }

        #overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(50,0,20,0.9) 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
            z-index: 10; backdrop-filter: blur(8px);
        }

        .message-panel {
            background: rgba(255,255,255,0.05);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 71, 87, 0.4);
            max-width: 85%;
            text-align: center;
        }

        .btn { 
            padding: 18px 45px; font-size: 20px; cursor: pointer; 
            background: #ff4757; color: white; border: none; 
            border-radius: 50px; margin-top: 30px; font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
            text-transform: uppercase;
        }

        h1 { font-size: 2.2rem; margin: 0 0 15px 0; color: #ff4757; text-shadow: 0 0 10px rgba(255,71,87,0.5); }
        p { font-size: 1.1rem; line-height: 1.5; color: #eee; margin: 0; }
        .hidden { display: none !important; }
    </style>
</head>

        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            car.y = canvas.height - 180;
            updateCarX();
        }

        function updateCarX() {
            const laneWidth = canvas.width / 3;
            car.x = (car.lane * laneWidth) + (laneWidth / 2) - (car.w / 2);
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            const touchX = e.touches[0].clientX;

                if (car.lane > 0) car.lane--;
            } else {
                if (car.lane < 2) car.lane++;
            }
            updateCarX();
        });
