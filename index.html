<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ismayanti Hero Quest</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{
  margin:0;
  overflow:hidden;
  background:#1e1e2f;
  touch-action:none;
}
canvas{
  display:block;
}
#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:sans-serif;
  z-index:10;
}
.bar{
  width:150px;
  height:15px;
  background:#444;
  margin-bottom:5px;
  border-radius:10px;
  overflow:hidden;
}
.fill{
  height:100%;
}
#heroFill{ background:#ff66b2;}
#dragonFill{ background:#ff3333;}
</style>
</head>
<body>

<div id="ui">
  ❤️ Hero HP
  <div class="bar"><div id="heroFill" class="fill"></div></div>
  🐉 Dragon HP
  <div class="bar"><div id="dragonFill" class="fill"></div></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hero = {
  x:100,
  y:canvas.height/2,
  size:25,
  speed:3,
  hp:100
};

let dragon = {
  x:canvas.width-120,
  y:canvas.height/2,
  size:60,
  hp:250,
  direction:1
};

let bullets = [];
let fireballs = [];

let joystick = {
  active:false,
  startX:0,
  startY:0,
  dx:0,
  dy:0
};

canvas.addEventListener("touchstart", e=>{
  const touch = e.touches[0];
  if(touch.clientX < canvas.width/2){
    joystick.active = true;
    joystick.startX = touch.clientX;
    joystick.startY = touch.clientY;
  }else{
    shoot();
  }
});

canvas.addEventListener("touchmove", e=>{
  if(!joystick.active) return;
  const touch = e.touches[0];
  joystick.dx = touch.clientX - joystick.startX;
  joystick.dy = touch.clientY - joystick.startY;
});

canvas.addEventListener("touchend", ()=>{
  joystick.active = false;
  joystick.dx = 0;
  joystick.dy = 0;
});

function shoot(){
  let angle = Math.atan2(dragon.y-hero.y, dragon.x-hero.x);
  bullets.push({
    x:hero.x,
    y:hero.y,
    dx:Math.cos(angle)*6,
    dy:Math.sin(angle)*6,
    size:6
  });
}

function dragonShoot(){
  let angle = Math.atan2(hero.y-dragon.y, hero.x-dragon.x);
  fireballs.push({
    x:dragon.x,
    y:dragon.y,
    dx:Math.cos(angle)*3,
    dy:Math.sin(angle)*3,
    size:10
  });
}
setInterval(dragonShoot,1800);

function update(){

  // Joystick movement
  hero.x += joystick.dx * 0.02;
  hero.y += joystick.dy * 0.02;

  // Keep in screen
  hero.x = Math.max(hero.size, Math.min(canvas.width-hero.size, hero.x));
  hero.y = Math.max(hero.size, Math.min(canvas.height-hero.size, hero.y));

  // Dragon simple movement
  dragon.y += dragon.direction * 1.5;
  if(dragon.y < 100 || dragon.y > canvas.height-100){
    dragon.direction *= -1;
  }

  bullets.forEach((b,i)=>{
    b.x += b.dx;
    b.y += b.dy;

    if(Math.hypot(b.x-dragon.x,b.y-dragon.y) < dragon.size){
      dragon.hp -= 10;
      bullets.splice(i,1);
    }
  });

  fireballs.forEach((f,i)=>{
    f.x += f.dx;
    f.y += f.dy;

    if(Math.hypot(f.x-hero.x,f.y-hero.y) < hero.size){
      hero.hp -= 10;
      fireballs.splice(i,1);
    }
  });

  if(hero.hp <= 0){
    alert("Hero fainted 💔 Try again!");
    location.reload();
  }

  if(dragon.hp <= 0){
    winGame();
  }

  document.getElementById("heroFill").style.width = hero.hp + "%";
  document.getElementById("dragonFill").style.width = dragon.hp/2.5 + "%";
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Hero
  ctx.fillStyle="#ff99cc";
  ctx.beginPath();
  ctx.arc(hero.x,hero.y,hero.size,0,Math.PI*2);
  ctx.fill();

  // Dragon
  ctx.fillStyle="#9933ff";
  ctx.beginPath();
  ctx.arc(dragon.x,dragon.y,dragon.size,0,Math.PI*2);
  ctx.fill();

  // Bullets
  ctx.fillStyle="#ff66b2";
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
    ctx.fill();
  });

  // Fireballs
  ctx.fillStyle="orange";
  fireballs.forEach(f=>{
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.size,0,Math.PI*2);
    ctx.fill();
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function winGame(){
  document.body.innerHTML = `
  <div style="text-align:center;margin-top:100px;color:white;font-family:sans-serif;">
    <h1>🏰 Tower Unlocked!</h1>
    <h2>Ismayanti Baizura, you saved your husband 💖</h2>
    <p style="max-width:600px;margin:auto;font-size:18px;">
    5 March — My hero was born.
    Every year you grow stronger, more beautiful,
    and more powerful than any dragon.
    I love you forever.
    Happy Birthday My Warrior Queen 💕
    </p>
  </div>`;
}

loop();
</script>
</body>
</html>
