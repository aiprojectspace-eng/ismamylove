<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Racing Day: Ismayanti's Birthday Race!</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #0f0f0f; 
            font-family: 'Segoe UI', sans-serif; touch-action: none; color: white;
        }
        canvas { display: block; background: #1a1a1a; margin: 0 auto; }
        
        /* UI Top Left - Driver Name */
        #driver-ui {
            position: absolute; top: 15px; left: 15px;
            font-size: 14px; font-weight: bold; color: #ff4757;
            text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 0 0 5px #ff4757; z-index: 5;
        }

        #ui { 
            position: absolute; top: 25px; width: 100%; text-align: center; 
            font-size: 32px; font-weight: 900; pointer-events: none; color: #fff;
            text-shadow: 0 0 10px #ff4757; z-index: 5;
        }

        /* Floating Text Style */
        #praise-ui {
            position: absolute; top: 40%; width: 100%; text-align: center;
            font-size: 28px; font-weight: bold; color: #feca57;
            text-shadow: 0 0 10px #000; pointer-events: none;
            z-index: 6; opacity: 0; transition: opacity 0.2s;
        }

        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        .message-panel {
            background: rgba(255,255,255,0.05); padding: 40px 20px;
            border-radius: 30px; border: 1px solid rgba(255, 71, 87, 0.4);
            max-width: 85%; text-align: center;
        }
        .btn { 
            padding: 18px 45px; font-size: 20px; cursor: pointer; 
            background: #ff4757; color: white; border: none; 
            border-radius: 50px; margin-top: 30px; font-weight: bold;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="driver-ui">Driver: Ismayanti Baizura 🏎️</div>
    <div id="ui">❤️ <span id="score">0</span> / 10</div>
    <div id="praise-ui">Nice Sayang!</div>

    <div id="overlay">
        <div class="message-panel">
            <h1 style="color:#ff4757">Racing Di Hari Birthday.. Hehe</h1>
            <p id="msg-p">Elak <b>STRESS</b> 💢<br>Kutip 10 <b>LOVE</b> ❤️<br><br>Guna tap <b>KIRI/KANAN</b></p>
            <button class="btn" id="startBtn">Mula Enjin</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const msgP = document.getElementById('msg-p');
        const praiseUi = document.getElementById('praise-ui');

        let gameRunning = false;
        let score = 0;
        let frame = 0;
        let items = [];
        let speed = 6;
        let roadOffset = 0;
        let shakeTime = 0;

        const praises = [
            "Nice Sayang!", "Good Job Yang!", "Great Adindaku!", 
            "Almost There Sayang!", "Sikit Lagi!", "Yahooo!", 
            "Sayang Power!", "Racing Eh Yang?"
        ];

        const carImg = new Image();
        carImg.src = 'saga_blm.png'; 

        let car = { lane: 1, w: 65, h: 125, x: 0, y: 0 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            car.y = canvas.height - 180;
            updateCarX();
        }

        function updateCarX() {
            const laneWidth = canvas.width / 3;
            car.x = (car.lane * laneWidth) + (laneWidth / 2) - (car.w / 2);
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            const touchX = e.touches[0].clientX;
            if (touchX < canvas.width / 2) {
                if (car.lane > 0) car.lane--;
            } else {
                if (car.lane < 2) car.lane++;
            }
            updateCarX();
        });

        function showPraise() {
            const randomWord = praises[Math.floor(Math.random() * praises.length)];
            praiseUi.innerText = randomWord;
            praiseUi.style.opacity = 1;
            setTimeout(() => { praiseUi.style.opacity = 0; }, 800);
        }

        function spawnItem() {
            const lane = Math.floor(Math.random() * 3);
            const isLove = Math.random() > 0.4; 
            items.push({ lane, y: -100, type: isLove ? '❤️' : '💢', isGood: isLove });
        }

        function startGame() {
            score = 0;
            items = [];
            speed = 6;
            gameRunning = true;
            overlay.classList.add('hidden');
            scoreEl.innerText = score;
            animate();
        }

        function winGame() {
            gameRunning = false;
            overlay.classList.remove('hidden');
            document.querySelector('h1').innerHTML = "SELAMAT HARI LAHIR ISTERIKU ISMAYANTI BAIZURA! 🎂";
            msgP.innerHTML = "Saga Silver ni berjaya bawa cinta saya kat awak tau!<br><br>I love you so much, Baizura! ❤️🌹";
            startBtn.innerText = "Main Lagi";
        }

        startBtn.addEventListener('click', startGame);

        function drawRoad() {
            const w = canvas.width;
            const h = canvas.height;
            const laneW = w / 3;
            roadOffset += speed;
            if (roadOffset > 100) roadOffset = 0;

            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.setLineDash([40, 60]);
            ctx.beginPath();
            ctx.moveTo(laneW, roadOffset - 100); ctx.lineTo(laneW, h + 100);
            ctx.moveTo(2*laneW, roadOffset - 100); ctx.lineTo(2*laneW, h + 100);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.strokeStyle = "#ff4757";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(2, 0); ctx.lineTo(2, h);
            ctx.moveTo(w-2, 0); ctx.lineTo(w-2, h);
            ctx.stroke();
        }

        function animate() {
            if (!gameRunning) return;
            
            ctx.save();
            if (shakeTime > 0) {
                ctx.translate(Math.random() * 5 - 2.5, Math.random() * 5 - 2.5);
                shakeTime--;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (score > 4) speed = 8;
            if (score > 8) speed = 11;

            drawRoad();

            if (carImg.complete) {
                ctx.drawImage(carImg, car.x, car.y, car.w, car.h);
            }

            if (frame % Math.max(30, 50 - score) === 0) spawnItem();

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += speed;
                let itemX = (it.lane * (canvas.width/3)) + (canvas.width/6);
                ctx.font = "45px Arial";
                ctx.textAlign = "center";
                ctx.fillText(it.type, itemX, it.y);

                if (it.y > car.y && it.y < car.y + car.h && it.lane === car.lane) {
                    if (it.isGood) {
                        score++;
                        scoreEl.innerText = score;
                        shakeTime = 10; 
                        showPraise(); // Keluar random word
                        if (score >= 10) winGame();
                    } else {
                        score = Math.max(0, score - 1);
                        scoreEl.innerText = score;
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                    items.splice(i, 1);
                }
                if (it.y > canvas.height + 50) items.splice(i, 1);
            }
            ctx.restore();
            frame++;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
