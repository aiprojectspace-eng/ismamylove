<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Sayang!</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; background: #555; margin: 0 auto; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; box-sizing: border-box;
        }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 50px; margin-top: 20px; }
        .hidden { display: none !important; }
        h1 { color: #ff4757; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span> / 10</div>

    <div id="overlay">
        <h1 id="msg-title">Road to Your Heart 🏎️</h1>
        <p id="msg-p">Sayang, tap KIRI atau KANAN skrin untuk gerakkan kereta. Kutip 10 'LOVE' untuk hadiah!</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const msgTitle = document.getElementById('msg-title');
        const msgP = document.getElementById('msg-p');

        let gameRunning = false;
        let score = 0;
        let car = { x: 0, y: 0, w: 50, h: 80, lane: 1 };
        let items = [];
        let speed = 5;
        let frame = 0;

        // Resize canvas to mobile screen
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            car.y = canvas.height - 120;
            updateCarPos();
        }

        function updateCarPos() {
            const laneWidth = canvas.width / 3;
            car.x = (car.lane * laneWidth) + (laneWidth / 2) - (car.w / 2);
        }

        window.addEventListener('resize', resize);
        resize();

        // Touch Controls
        window.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            const touchX = e.touches[0].clientX;
            if (touchX < canvas.width / 2) {
                if (car.lane > 0) car.lane--;
            } else {
                if (car.lane < 2) car.lane++;
            }
            updateCarPos();
        });

        function spawnItem() {
            const lane = Math.floor(Math.random() * 3);
            const isGood = Math.random() > 0.3; // 70% chance good item
            items.push({
                lane: lane,
                y: -100,
                type: isGood ? '❤️' : '❌',
                isGood: isGood
            });
        }

        function startGame() {
            score = 0;
            items = [];
            gameRunning = true;
            overlay.classList.add('hidden');
            scoreEl.innerText = score;
            animate();
        }

        function endGame() {
            gameRunning = false;
            overlay.classList.remove('hidden');
            msgTitle.innerText = "HAPPY BIRTHDAY SAYANG! 🎂";
            msgP.innerText = "You've reached my heart! I love you so much. ❤️\n\n(Insert your personal message here)";
            document.querySelector('button').innerText = "Play Again";
        }

        function animate() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Lanes
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(canvas.width/3, 0); ctx.lineTo(canvas.width/3, canvas.height);
            ctx.moveTo(2*canvas.width/3, 0); ctx.lineTo(2*canvas.width/3, canvas.height);
            ctx.stroke();

            // Draw Car (Simple Box with Emoji)
            ctx.font = "50px Arial";
            ctx.fillText("🏎️", car.x, car.y + 50);

            // Update & Draw Items
            if (frame % 60 === 0) spawnItem();
            
            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += speed;
                const laneWidth = canvas.width / 3;
                let itemX = (it.lane * laneWidth) + (laneWidth / 2) - 20;
                
                ctx.fillText(it.type, itemX, it.y);

                // Collision Detection
                if (it.y > car.y && it.y < car.y + car.h && it.lane === car.lane) {
                    if (it.isGood) {
                        score++;
                        scoreEl.innerText = score;
                        items.splice(i, 1);
                        if (score >= 10) endGame();
                    } else {
                        score = Math.max(0, score - 1);
                        scoreEl.innerText = score;
                        items.splice(i, 1);
                    }
                }

                if (it.y > canvas.height) items.splice(i, 1);
            }

            frame++;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
